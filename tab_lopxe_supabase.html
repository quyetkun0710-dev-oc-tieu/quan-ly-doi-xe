<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Lốp Xe - Fleet Core V2</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #6366f1;
      --secondary: #a855f7;
      --accent: #00ffcc;
      --bg: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text: #f8fafc;
      --text-dim: #94a3b8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }
    body {
      background: var(--bg);
      background-image: 
        radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent),
        radial-gradient(circle at bottom left, rgba(168, 85, 247, 0.1), transparent);
      color: var(--text);
      min-height: 100vh;
      padding: 2.5rem;
    }
    .container { max-width:1400px; margin:0 auto; }
    header { display:flex; justify-content:space-between; align-items:center; margin-bottom:2.5rem; animation:fadeInDown 0.8s; }
    .logo-area h1 { font-size:2.2rem; font-weight:800; background:linear-gradient(to right,#fff,var(--primary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .logo-area p { color:var(--text-dim); font-size:0.9rem; margin-top:4px; }
    .controls { display:flex; gap:1rem; align-items:center; }
    .search-box { background:var(--card-bg); border-radius:12px; padding:0.5rem 1rem; border:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(10px); display:flex; align-items:center; gap:8px; }
    .search-box input { background:transparent; border:none; color:white; outline:none; width:220px; font-size:0.95rem; font-family:'Outfit',sans-serif; }
    .btn-add { background:linear-gradient(135deg,var(--primary),var(--secondary)); color:white; border:none; padding:0.75rem 1.4rem; border-radius:12px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:8px; transition:all 0.3s; font-family:'Outfit',sans-serif; }
    .btn-add:hover { transform:scale(1.05) translateY(-2px); }

    .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(165px,1fr)); gap:1.2rem; margin-bottom:2rem; animation:fadeIn 1s; }
    .stat-card { background:var(--card-bg); padding:1.2rem 1.3rem; border-radius:20px; border:1px solid rgba(255,255,255,0.05); backdrop-filter:blur(12px); text-align:center; transition:all 0.3s; cursor:pointer; }
    .stat-card:hover { transform:translateY(-5px); border-color:var(--primary); box-shadow:0 10px 20px rgba(0,0,0,0.2); }
    .stat-card h3 { font-size:0.7rem; text-transform:uppercase; color:var(--text-dim); margin-bottom:4px; letter-spacing:0.5px; }
    .stat-card .value { font-size:1.9rem; font-weight:800; color:var(--accent); }

    .filter-bar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:1.5rem; }
    .filter-btn { padding:6px 14px; border-radius:20px; border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:var(--text-dim); cursor:pointer; font-size:0.82rem; font-weight:600; transition:all 0.2s; font-family:'Outfit',sans-serif; }
    .filter-btn.active, .filter-btn:hover { background:var(--primary); border-color:var(--primary); color:white; }

    .tire-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(350px,1fr)); gap:1.5rem; padding-bottom:5rem; }

    .tire-card {
      background:var(--card-bg); border-radius:20px; padding:1.4rem;
      border:1px solid rgba(255,255,255,0.05); backdrop-filter:blur(12px);
      transition:all 0.3s; animation:slideUp 0.5s ease-out forwards; opacity:0;
      display:flex; flex-direction:column; gap:1rem;
    }
    .tire-card:hover { transform:translateY(-5px); box-shadow:0 20px 40px rgba(0,0,0,0.3); }
    .tire-card.status-warn { border-left:4px solid var(--warning); }
    .tire-card.status-danger { border-left:4px solid var(--danger); }
    .tire-card.status-ok { border-left:4px solid var(--success); }

    .tire-top { display:flex; justify-content:space-between; align-items:center; }
    .plate-tag { background:var(--primary); color:white; padding:4px 12px; border-radius:8px; font-weight:800; font-size:1.05rem; }
    .km-badge { font-size:0.75rem; font-weight:700; padding:4px 10px; border-radius:20px; }
    .km-ok { background:rgba(16,185,129,0.15); color:var(--success); }
    .km-warn { background:rgba(245,158,11,0.2); color:var(--warning); }
    .km-danger { background:rgba(239,68,68,0.2); color:var(--danger); }

    .tire-info { display:grid; grid-template-columns:1fr 1fr; gap:0.8rem; background:rgba(15,23,42,0.3); border-radius:12px; padding:1rem; }
    .info-item { display:flex; flex-direction:column; gap:2px; }
    .info-label { font-size:0.65rem; color:var(--text-dim); text-transform:uppercase; }
    .info-value { font-size:0.9rem; font-weight:600; }

    /* KM Progress Bar */
    .km-bar-wrap { display:flex; flex-direction:column; gap:4px; }
    .km-bar-label { display:flex; justify-content:space-between; font-size:0.7rem; color:var(--text-dim); }
    .km-bar-track { background:rgba(255,255,255,0.06); border-radius:99px; height:8px; overflow:hidden; }
    .km-bar-fill { height:100%; border-radius:99px; transition:width 0.6s; }

    .tire-footer { display:flex; justify-content:flex-end; gap:8px; padding-top:0.5rem; border-top:1px solid rgba(255,255,255,0.05); }
    .btn-icon { width:34px; height:34px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.05); color:var(--text-dim); border:none; cursor:pointer; transition:all 0.2s; }
    .btn-icon:hover { background:var(--primary); color:white; }

    .modal { position:fixed; inset:0; background:rgba(15,23,42,0.85); backdrop-filter:blur(15px); display:none; justify-content:center; align-items:center; z-index:1000; padding:1rem; }
    .modal.active { display:flex; }
    .modal-content { background:#1e293b; padding:2.5rem; border-radius:28px; width:100%; max-width:700px; max-height:90vh; overflow-y:auto; border:1px solid rgba(255,255,255,0.1); box-shadow:0 40px 80px rgba(0,0,0,0.5); }
    .form-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:1.2rem; }
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-group label { font-size:0.8rem; color:var(--text-dim); font-weight:600; text-transform:uppercase; }
    .form-group input, .form-group select, .form-group textarea { background:rgba(15,23,42,0.5); border:1px solid rgba(255,255,255,0.1); padding:0.8rem; border-radius:12px; color:white; outline:none; font-family:'Outfit',sans-serif; transition:all 0.2s; }
    .form-group input:focus,.form-group select:focus { border-color:var(--primary); }
    .modal-actions { margin-top:2rem; display:flex; justify-content:flex-end; gap:1rem; }
    .btn-cancel { background:#334155; color:white; padding:0.8rem 1.5rem; border-radius:12px; font-weight:600; border:none; cursor:pointer; font-family:'Outfit',sans-serif; }
    .btn-save { background:linear-gradient(135deg,var(--primary),var(--secondary)); color:white; padding:0.8rem 1.8rem; border-radius:12px; font-weight:700; border:none; cursor:pointer; font-family:'Outfit',sans-serif; }

    @keyframes fadeInDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-area">
      <h1>🔧 LỐP XE</h1>
      <p>Theo dõi và quản lý lốp xe đội vận tải</p>
    </div>
    <div class="controls">
      <div class="search-box">
        <i class="fas fa-search" style="color:var(--text-dim)"></i>
        <input type="text" id="searchInput" placeholder="Tìm biển số xe..." oninput="applyFilter()">
      </div>
      <button class="btn-add" onclick="openModal()">
        <i class="fas fa-plus"></i> THÊM BẢN GHI
      </button>
    </div>
  </header>

  <div class="stats-row">
    <div class="stat-card" onclick="setFilter('all', document.querySelector('.filter-btn'))">
        <h3>Tổng bản ghi</h3>
        <div class="value" id="statTotal">0</div>
    </div>
    <div class="stat-card" onclick="setFilter('ok', document.querySelectorAll('.filter-btn')[1])">
        <h3>Lốp bình thường</h3>
        <div class="value" id="statOk" style="color:var(--success)">0</div>
    </div>
    <div class="stat-card" onclick="setFilter('warn', document.querySelectorAll('.filter-btn')[2])">
        <h3>⚠ Sắp thay</h3>
        <div class="value" id="statWarn" style="color:var(--warning)">0</div>
    </div>
    <div class="stat-card" onclick="setFilter('danger', document.querySelectorAll('.filter-btn')[3])">
        <h3>🔴 Cần thay ngay</h3>
        <div class="value" id="statDanger" style="color:var(--danger)">0</div>
    </div>
    <div class="stat-card">
        <h3>Tổng KM lốp TB</h3>
        <div class="value" id="statAvgKm" style="font-size:1.2rem;color:var(--primary)">0</div>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">🔧 Tất cả</button>
    <button class="filter-btn" onclick="setFilter('ok',this)">✅ Bình thường</button>
    <button class="filter-btn" onclick="setFilter('warn',this)">⚠ Sắp thay (≤10,000km)</button>
    <button class="filter-btn" onclick="setFilter('danger',this)">🔴 Cần thay ngay (≤5,000km)</button>
  </div>

  <div class="tire-grid" id="tireGrid"></div>
</div>

<!-- Modal -->
<div class="modal" id="tireModal">
  <div class="modal-content">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem">
      <div>
        <h2 id="modalTitle" style="font-weight:800;font-size:1.8rem;margin-bottom:4px">Thêm Bản Ghi Lốp</h2>
        <p style="color:var(--text-dim);font-size:0.85rem">Nhập thông tin lốp xe</p>
      </div>
      <button class="btn-icon" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <form id="tireForm">
      <input type="hidden" id="editId">
      <div class="form-grid">
        <div class="form-group">
          <label>Biển số xe *</label>
          <input type="text" id="bien_so_xe" list="vehicleList" required>
          <datalist id="vehicleList"></datalist>
        </div>
        <div class="form-group">
          <label>Vị trí lốp</label>
          <select id="vi_tri_lop">
            <option value="Trước trái">Trước trái</option>
            <option value="Trước phải">Trước phải</option>
            <option value="Sau trái trong">Sau trái trong</option>
            <option value="Sau trái ngoài">Sau trái ngoài</option>
            <option value="Sau phải trong">Sau phải trong</option>
            <option value="Sau phải ngoài">Sau phải ngoài</option>
            <option value="Dự phòng">Dự phòng</option>
          </select>
        </div>
        <div class="form-group">
          <label>Thương hiệu lốp</label>
          <input type="text" id="thuong_hieu" placeholder="Michelin, Bridgestone...">
        </div>
        <div class="form-group">
          <label>Thông số lốp</label>
          <input type="text" id="thong_so" placeholder="265/70R19.5...">
        </div>
        <div class="form-group">
          <label>KM lắp lốp (km gauge)</label>
          <input type="number" id="km_lap" placeholder="KM lúc lắp lốp">
        </div>
        <div class="form-group">
          <label>KM hiện tại</label>
          <input type="number" id="km_hien_tai" placeholder="KM hiện tại xe" oninput="calcKmUsed()">
        </div>
        <div class="form-group">
          <label>KM đã chạy (Tự tính)</label>
          <input type="number" id="km_su_dung" readonly style="background:rgba(255,255,255,0.03)">
        </div>
        <div class="form-group">
          <label>Giới hạn KM lốp</label>
          <input type="number" id="km_gioi_han" placeholder="60000" value="60000">
        </div>
        <div class="form-group">
          <label>Ngày lắp</label>
          <input type="date" id="ngay_lap">
        </div>
        <div class="form-group">
          <label>Trạng thái</label>
          <select id="trang_thai">
            <option value="Đang dùng">Đang dùng</option>
            <option value="Đã thay">Đã thay</option>
            <option value="Sửa chữa">Sửa chữa</option>
          </select>
        </div>
        <div class="form-group" style="grid-column:span 2">
          <label>Ghi chú</label>
          <textarea id="ghi_chu" rows="2"></textarea>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" onclick="closeModal()">Đóng</button>
        <button type="submit" class="btn-save" id="saveBtn">Lưu Bản Ghi</button>
      </div>
    </form>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://mpuqcmektepsqsazuvtb.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wdXFjbWVrdGVwc3FzYXp1dnRiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzE0NjU5OCwiZXhwIjoyMDg4NzIyNTk4fQ.eBWCfXV5v4SNSICYg_wVwaez9ycRk7-XmTry7UnHTU8";
  const { createClient } = supabase;
  const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  let allTires = [];
  let currentFilter = 'all';

  function calcKmUsed() {
    const lap = parseFloat(document.getElementById('km_lap').value) || 0;
    const hien = parseFloat(document.getElementById('km_hien_tai').value) || 0;
    document.getElementById('km_su_dung').value = Math.max(0, hien - lap);
  }

  async function loadTires() {
    const grid = document.getElementById('tireGrid');
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:5rem"><i class="fas fa-spinner fa-spin fa-2x" style="color:var(--primary)"></i></div>';
    try {
      // 1. Fetch tire data
      const { data: tireData, error: tireErr } = await _supabase.from('lopxe').select('*').order('created_at', { ascending: false });
      if (tireErr) throw tireErr;

      // 2. Fetch latest mileage from nhatky (daily logs)
      const { data: logData } = await _supabase.from('nhatky').select('bien_so_xe, km_ve').order('km_ve', { ascending: false });
      const latestKmMap = {};
      if (logData) {
        logData.forEach(l => {
          if (!latestKmMap[l.bien_so_xe] || (l.km_ve && l.km_ve > latestKmMap[l.bien_so_xe])) {
            latestKmMap[l.bien_so_xe] = l.km_ve;
          }
        });
      }

      // 3. Map real-time KM to tires
      allTires = (tireData || []).map(t => {
        const liveKm = latestKmMap[t.bien_so_xe] || t.km_hien_tai || 0;
        const usedKm = Math.max(0, liveKm - (t.km_lap || 0));
        return {
          ...t,
          km_hien_tai: liveKm,
          km_su_dung: usedKm
        };
      });

      updateStats(allTires);
      applyFilter();
    } catch(e) {
      grid.innerHTML = `<div style="grid-column:1/-1;color:var(--danger);padding:2rem">Lỗi: ${e.message}</div>`;
    }
  }

  async function loadDropdowns() {
    const { data: xe } = await _supabase.from('xe').select('bien_so_xe');
    if (xe) document.getElementById('vehicleList').innerHTML = xe.map(v=>`<option value="${v.bien_so_xe}">`).join('');
  }

  function getStatus(t) {
    const used = parseFloat(t.km_su_dung) || 0;
    const limit = parseFloat(t.km_gioi_han) || 60000;
    const remain = limit - used;
    if (remain <= 5000) return 'danger';
    if (remain <= 10000) return 'warn';
    return 'ok';
  }

  function updateStats(data) {
    const statuses = data.map(t=>getStatus(t));
    document.getElementById('statTotal').innerText = data.length;
    document.getElementById('statOk').innerText = statuses.filter(s=>s==='ok').length;
    document.getElementById('statWarn').innerText = statuses.filter(s=>s==='warn').length;
    document.getElementById('statDanger').innerText = statuses.filter(s=>s==='danger').length;
    const avg = data.length ? Math.round(data.reduce((s,t)=>s+(parseFloat(t.km_su_dung)||0),0)/data.length) : 0;
    document.getElementById('statAvgKm').innerText = avg.toLocaleString('vi-VN') + ' km';
  }

  function setFilter(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter();
  }

  function applyFilter() {
    let filtered = [...allTires];
    if (currentFilter === 'ok') filtered = filtered.filter(t=>getStatus(t)==='ok');
    else if (currentFilter === 'warn') filtered = filtered.filter(t=>getStatus(t)==='warn');
    else if (currentFilter === 'danger') filtered = filtered.filter(t=>getStatus(t)==='danger');
    const q = document.getElementById('searchInput').value.toLowerCase();
    if (q) filtered = filtered.filter(t=>(t.bien_so_xe||'').toLowerCase().includes(q));
    renderTires(filtered);
  }

  function renderTires(data) {
    const grid = document.getElementById('tireGrid');
    grid.innerHTML = '';
    if (data.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:5rem;color:var(--text-dim)">Không có dữ liệu lốp xe.</div>';
      return;
    }
    data.forEach((t, idx) => {
      const card = document.createElement('div');
      const status = getStatus(t);
      card.className = `tire-card status-${status}`;
      card.style.animationDelay = `${idx * 0.05}s`;
      const used = parseFloat(t.km_su_dung) || 0;
      const limit = parseFloat(t.km_gioi_han) || 60000;
      const remain = Math.max(0, limit - used);
      const pct = Math.min(100, (used / limit) * 100);
      const barColor = status === 'danger' ? 'var(--danger)' : status === 'warn' ? 'var(--warning)' : 'var(--success)';
      const kmBadgeClass = status === 'danger' ? 'km-danger' : status === 'warn' ? 'km-warn' : 'km-ok';
      const kmBadgeText = remain <= 0 ? '⛔ HẾT HẠN' : `Còn ${remain.toLocaleString('vi-VN')} km`;
      card.innerHTML = `
        <div class="tire-top">
          <span class="plate-tag">${t.bien_so_xe||'—'}</span>
          <span class="km-badge ${kmBadgeClass}">${kmBadgeText}</span>
        </div>
        <div class="tire-info">
          <div class="info-item"><span class="info-label">Vị trí lốp</span><span class="info-value">${t.vi_tri_lop||'—'}</span></div>
          <div class="info-item"><span class="info-label">Thương hiệu</span><span class="info-value">${t.thuong_hieu||'—'}</span></div>
          <div class="info-item"><span class="info-label">Thông số</span><span class="info-value">${t.thong_so||'—'}</span></div>
          <div class="info-item"><span class="info-label">Ngày lắp</span><span class="info-value">${t.ngay_lap||'—'}</span></div>
        </div>
        <div class="km-bar-wrap">
          <div class="km-bar-label"><span>KM sử dụng: ${used.toLocaleString('vi-VN')}</span><span>Giới hạn: ${limit.toLocaleString('vi-VN')}</span></div>
          <div class="km-bar-track">
            <div class="km-bar-fill" style="width:${pct}%;background:${barColor}"></div>
          </div>
        </div>
        <div class="tire-footer">
          <button class="btn-icon" onclick="editTire(${t.id})" title="Sửa"><i class="fas fa-edit"></i></button>
          <button class="btn-icon" style="color:var(--danger)" onclick="deleteTire(${t.id})" title="Xóa"><i class="fas fa-trash"></i></button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function openModal(editData=null) {
    document.getElementById('tireForm').reset();
    document.getElementById('editId').value = '';
    document.getElementById('km_gioi_han').value = '60000';
    document.getElementById('ngay_lap').value = new Date().toISOString().split('T')[0];
    if (editData) {
      document.getElementById('modalTitle').innerText = 'Cập Nhật Bản Ghi Lốp';
      document.getElementById('editId').value = editData.id;
      ['bien_so_xe','vi_tri_lop','thuong_hieu','thong_so','km_lap','km_hien_tai','km_su_dung','km_gioi_han','ngay_lap','trang_thai','ghi_chu'].forEach(f=>{
        const el = document.getElementById(f); if(el) el.value = editData[f]||'';
      });
    } else {
      document.getElementById('modalTitle').innerText = 'Thêm Bản Ghi Lốp Mới';
    }
    document.getElementById('tireModal').classList.add('active');
  }

  function closeModal() { document.getElementById('tireModal').classList.remove('active'); }
  function editTire(id) { const t = allTires.find(x=>x.id===id); if(t) openModal(t); }

  async function deleteTire(id) {
    if (!confirm('Xóa bản ghi lốp này?')) return;
    const { error } = await _supabase.from('lopxe').delete().eq('id', id);
    if (!error) loadTires(); else alert('Lỗi: ' + error.message);
  }

  document.getElementById('tireForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('saveBtn');
    btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Đang lưu...';
    const id = document.getElementById('editId').value;
    const payload = { updated_at: new Date().toISOString() };
    ['bien_so_xe','vi_tri_lop','thuong_hieu','thong_so','km_lap','km_hien_tai','km_su_dung','km_gioi_han','ngay_lap','trang_thai','ghi_chu'].forEach(f=>{
      const el = document.getElementById(f);
      if (el) payload[f] = ['km_lap','km_hien_tai','km_su_dung','km_gioi_han'].includes(f) ? (parseFloat(el.value)||0) : el.value;
    });
    try {
      let res;
      if (id) res = await _supabase.from('lopxe').update(payload).eq('id', id);
      else res = await _supabase.from('lopxe').insert([payload]);
      if (res.error) throw res.error;
      closeModal(); loadTires();
    } catch(err) { alert('Lỗi: '+err.message); }
    finally { btn.disabled=false; btn.innerHTML='Lưu Bản Ghi'; }
  };

  document.addEventListener('DOMContentLoaded', () => {
    loadTires(); loadDropdowns();
    const channel = _supabase.channel('db-changes');
    channel.on('postgres_changes', { event: '*', schema: 'public', table: 'lopxe' }, () => loadTires())
           .on('postgres_changes', { event: '*', schema: 'public', table: 'nhatky' }, () => loadTires())
           .subscribe();
  });
</script>
</body>
</html>
