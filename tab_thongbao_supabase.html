<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Thông Báo Nội Bộ - Fleet Core V2</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #6366f1;
      --secondary: #a855f7;
      --accent: #00ffcc;
      --bg: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text: #f8fafc;
      --text-dim: #94a3b8;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    [data-theme='light'] {
      --bg: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.85);
      --text: #0f172a;
      --text-dim: #64748b;
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit',sans-serif; }
    body {
      background: var(--bg);
      background-image: 
        radial-gradient(circle at top right, rgba(99, 102, 241, 0.1), transparent 40%),
        radial-gradient(circle at bottom left, rgba(168, 85, 247, 0.08), transparent 40%);
      color: var(--text);
      min-height: 100vh;
      padding: 2.5rem;
    }
    .container { max-width:1000px; margin:0 auto; }
    header {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:2.5rem; animation:fadeInDown 0.8s ease-out;
    }
    .logo-area h1 {
      font-size:2.2rem; font-weight:800;
      background:linear-gradient(to right,var(--text),var(--primary));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .logo-area p { color:var(--text-dim); font-size:0.9rem; margin-top:4px; }
    .controls { display:flex; gap:1rem; align-items:center; }
    .search-box {
      background: var(--card-bg);
      border-radius:12px; padding:0.5rem 1rem;
      border:1px solid rgba(128,128,128,0.2); backdrop-filter:blur(10px);
      display:flex; align-items:center; gap:8px; transition:all 0.3s;
    }
    .search-box:focus-within { border-color:var(--primary); box-shadow:0 0 15px rgba(99,102,241,0.3); }
    .search-box input { background:transparent; border:none; color: var(--text); outline:none; width:220px; font-size:1rem; }
    
    .control-btns { display: flex; gap: 10px; }
    .btn-add {
      background:linear-gradient(135deg,var(--primary),var(--secondary));
      color:white; border:none; padding:0.75rem 1.4rem; border-radius:12px;
      font-weight:600; cursor:pointer; display:flex; align-items:center; gap:8px;
      transition:all 0.3s; box-shadow:0 10px 20px rgba(99,102,241,0.2); font-family:'Outfit',sans-serif;
    }
    .btn-add:hover { transform:scale(1.05) translateY(-2px); }

    .btn-refresh {
        background: var(--card-bg); color: var(--text-dim); border: 1px solid rgba(128,128,128,0.2); 
        padding: 8px 16px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; 
        font-size: 0.85rem; display: flex; align-items: center; gap: 8px; font-family:'Outfit',sans-serif;
    }
    .btn-refresh:hover { background: rgba(99,102,241,0.1); color: var(--primary); transform: translateY(-2px); }
    .btn-refresh i { transition: transform 0.4s; }
    .btn-refresh:hover i { transform: rotate(180deg); }

    /* Filter Buttons */
    .filter-bar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:1.5rem; }
    .filter-btn {
        padding: 8px 16px; border-radius: 12px; border: 1px solid rgba(128,128,128,0.2);
        background: var(--card-bg); color: var(--text-dim); cursor: pointer;
        transition: all 0.2s; font-size: 0.8rem; font-weight: 700;
        display: flex; align-items: center; gap: 8px; white-space: nowrap;
    }
    .filter-btn .btn-badge {
        background: rgba(128,128,128,0.1); padding: 2px 8px; border-radius: 8px;
        font-size: 0.75rem; font-weight: 800; min-width: 20px; text-align: center;
        color: var(--text);
    }
    .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 8px 15px rgba(99, 102, 241, 0.2); }
    .filter-btn.active .btn-badge { background: white; color: var(--primary); }
    .filter-btn:hover:not(.active) { transform: translateY(-2px); background: rgba(128, 128, 128, 0.1); }

    /* Notice feed */
    .notice-feed { display:flex; flex-direction:column; gap:1.5rem; padding-bottom:5rem; }
    .notice-card {
      background:var(--card-bg); border-radius:24px; padding:1.8rem;
      border:1px solid rgba(128,128,128,0.1); backdrop-filter:blur(12px);
      transition:all 0.3s; animation:slideUp 0.5s ease-out forwards; opacity:0;
      display:flex; gap:1.5rem; position:relative; overflow:hidden;
    }
    .notice-card:hover { transform:translateY(-5px); box-shadow:0 25px 50px rgba(0,0,0,0.3); border-color: var(--primary); }
    .notice-icon-wrap {
      width:60px; height:60px; border-radius:18px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:1.8rem;
    }
    .mucdo-khancap .notice-card { border-left:5px solid var(--danger); }
    .mucdo-khancap .notice-icon-wrap { background:rgba(239,68,68,0.1); color:var(--danger); }
    .mucdo-quantrong .notice-card { border-left:5px solid var(--warning); }
    .mucdo-quantrong .notice-icon-wrap { background:rgba(245,158,11,0.1); color:var(--warning); }
    .mucdo-binhthuong .notice-card { border-left:5px solid var(--primary); }
    .mucdo-binhthuong .notice-icon-wrap { background:rgba(99,102,241,0.1); color:var(--primary); }

    .notice-content { flex:1; display:flex; flex-direction:column; gap:10px; }
    .notice-header { display:flex; justify-content:space-between; align-items:flex-start; }
    .notice-title { font-size:1.3rem; font-weight:800; line-height:1.3; color: var(--text); }
    .notice-meta { font-size:0.85rem; color:var(--text-dim); display:flex; gap:16px; align-items:center; }
    .notice-meta span { display:flex; align-items:center; gap:6px; }
    .notice-body { 
        font-size:1rem; line-height:1.7; color: var(--text); 
        white-space:pre-line; background: rgba(128, 128, 128, 0.05); 
        padding:1.2rem; border-radius:16px; margin-top:8px;
        border: 1px solid rgba(128, 128, 128, 0.05);
    }
    
    .notice-actions { display:flex; gap:10px; }
    .btn-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; background:var(--card-bg); color:var(--text-dim); border:1px solid rgba(128,128,128,0.1); cursor:pointer; transition:all 0.2s; }
    .btn-icon:hover { background:var(--primary); color:white; transform: scale(1.1); }

    /* Modal */
    .modal { position:fixed; inset:0; background:rgba(15,23,42,0.8); backdrop-filter:blur(15px); display:none; justify-content:center; align-items:center; z-index:1000; padding:1rem; }
    .modal.active { display:flex; }
    .modal-content { background:var(--bg); padding:2.5rem; border-radius:32px; width:100%; max-width:650px; border:1px solid rgba(128,128,128,0.2); box-shadow:0 40px 100px rgba(0,0,0,0.5); }
    
    .form-group { display:flex; flex-direction:column; gap:8px; margin-bottom:1.5rem; }
    .form-group label { font-size:0.85rem; color:var(--text-dim); font-weight:700; text-transform:uppercase; letter-spacing: 0.5px; }
    .form-group input, .form-group select, .form-group textarea { 
        background:var(--card-bg); border:1px solid rgba(128,128,128,0.2); 
        padding:1rem; border-radius:14px; color:var(--text); outline:none; 
        font-family:'Outfit',sans-serif; transition:all 0.2s; font-size: 1rem;
    }
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus { border-color:var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
    
    .modal-actions { margin-top:2.5rem; display:flex; justify-content:flex-end; gap:1.2rem; }
    .btn-cancel { background:var(--card-bg); color:var(--text); padding:0.9rem 1.8rem; border-radius:14px; font-weight:600; border:1px solid rgba(128,128,128,0.2); cursor:pointer; font-family:'Outfit',sans-serif; transition: all 0.2s; }
    .btn-cancel:hover { background: rgba(128, 128, 128, 0.1); }
    .btn-save { background:linear-gradient(135deg,var(--primary),var(--secondary)); color:white; padding:0.9rem 2.2rem; border-radius:14px; font-weight:700; border:none; cursor:pointer; font-family:'Outfit',sans-serif; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); transition: all 0.2s; }
    .btn-save:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(99, 102, 241, 0.4); }

    .manager-only { display: none; }

    @keyframes fadeInDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      body { padding: 1.2rem; }
      header { flex-direction: column; align-items: stretch; gap: 1rem; margin-bottom: 2rem; }
      .logo-area { text-align: center; }
      .controls { flex-direction:column; width:100%; gap:12px; }
      .search-box { width:100%; }
      .search-box input { width:100%; }
      .control-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
      .btn-refresh, .btn-add { width:100% !important; justify-content:center; margin:0; }
      .filter-bar { gap: 8px; }
      .notice-card { flex-direction: column; gap: 15px; padding: 1.5rem; border-radius: 20px; }
      .notice-icon-wrap { width: 50px; height: 50px; font-size: 1.5rem; }
      .notice-header { flex-direction: column; gap: 8px; position: relative; }
      .notice-title { font-size: 1.1rem; padding-right: 40px; }
      .notice-actions { position: absolute; top: 0; right: 0; }
      .modal-content { padding: 1.8rem !important; width: 95% !important; border-radius: 24px !important; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-area">
      <h1><i class="fas fa-bell"></i> THÔNG BÁO</h1>
      <p>Bảng tin cập nhật và thông báo từ ban quản trị</p>
    </div>
    <div class="controls">
      <div class="search-box">
        <i class="fas fa-search" style="color:var(--text-dim)"></i>
        <input type="text" id="searchInput" placeholder="Tìm thông báo..." oninput="applyFilter()">
      </div>
      <div class="control-btns">
        <button class="btn-refresh" onclick="loadNotices()">
          <i class="fas fa-sync-alt"></i> Làm mới
        </button>
        <button class="btn-add manager-only" onclick="openModal()">
          <i class="fas fa-plus"></i> ĐẢNG THÔNG BÁO
        </button>
      </div>
    </div>
  </header>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">📋 TẤT CẢ <span class="btn-badge" id="btnCountAll">0</span></button>
    <button class="filter-btn" onclick="setFilter('Khẩn cấp',this)">🔴 KHẨN CẤP <span class="btn-badge" id="btnCountHigh">0</span></button>
    <button class="filter-btn" onclick="setFilter('Quan trọng',this)">🟡 QUAN TRỌNG <span class="btn-badge" id="btnCountMedium">0</span></button>
    <button class="filter-btn" onclick="setFilter('Bình thường',this)">🔵 BÌNH THƯỜNG <span class="btn-badge" id="btnCountLow">0</span></button>
  </div>

  <div class="notice-feed" id="noticeFeed"></div>
</div>

<!-- Modal -->
<div class="modal" id="noticeModal">
  <div class="modal-content">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2rem">
      <div>
        <h2 id="modalTitle" style="font-weight:800;font-size:1.8rem;margin-bottom:6px">Đăng Thông Báo</h2>
        <p style="color:var(--text-dim);font-size:0.9rem">Thông báo sẽ được gửi tới toàn bộ đội ngũ</p>
      </div>
      <button class="btn-icon" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <form id="noticeForm">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label>Tiêu đề thông báo *</label>
        <input type="text" id="tieu_de" required placeholder="Nhập tiêu đề...">
      </div>
      <div class="form-group">
        <label>Mức độ quan trọng</label>
        <select id="muc_do">
          <option value="Bình thường">🔵 Bình thường</option>
          <option value="Quan trọng">🟡 Quan trọng</option>
          <option value="Khẩn cấp">🔴 Khẩn cấp</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nội dung *</label>
        <textarea id="noi_dung" rows="6" required placeholder="Nội dung chi tiết..."></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" onclick="closeModal()">Hủy</button>
        <button type="submit" class="btn-save" id="saveBtn">Đăng Thông Báo</button>
      </div>
    </form>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://mpuqcmektepsqsazuvtb.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wdXFjbWVrdGVwc3FzYXp1dnRiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzE0NjU5OCwiZXhwIjoyMDg4NzIyNTk4fQ.eBWCfXV5v4SNSICYg_wVwaez9ycRk7-XmTry7UnHTU8";
  const { createClient } = supabase;
  const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  let ROLE = sessionStorage.getItem('role') || 'taixe';
  let USER_NAME = sessionStorage.getItem('name') || 'Người dùng';
  
  let allNotices = [];
  let currentFilter = 'all';

  function logAudit(tableName, recordId, action, oldData, newData) {
    if (window.parent && window.parent.postMessage) {
        window.parent.postMessage({ 
            type: 'logAudit', 
            tableName, recordId, action, oldData, newData 
        }, '*');
    }
  }

  function safeNotifyParent() {
    if (window.parent && window.parent.postMessage) {
      window.parent.postMessage({ type: 'refreshStats' }, '*');
    }
  }

  async function loadNotices(isSilent = false) {
    const feed = document.getElementById('noticeFeed');
    if (!isSilent) feed.innerHTML = '<div style="text-align:center;padding:5rem"><i class="fas fa-spinner fa-spin fa-2x" style="color:var(--primary)"></i></div>';
    try {
      const { data, error } = await _supabase.from('thongbao').select('*').order('created_at', { ascending: false });
      if (error) throw error;
      allNotices = data || [];
      
      // Update stats
      document.getElementById('btnCountAll').innerText = allNotices.length;
      document.getElementById('btnCountHigh').innerText = allNotices.filter(n => n.muc_do === 'Khẩn cấp').length;
      document.getElementById('btnCountMedium').innerText = allNotices.filter(n => n.muc_do === 'Quan trọng').length;
      document.getElementById('btnCountLow').innerText = allNotices.filter(n => n.muc_do === 'Bình thường').length;

      applyFilter();
    } catch(e) {
      feed.innerHTML = `<div style="color:var(--danger);padding:4rem;text-align:center;font-weight:700;">Lỗi: ${e.message}</div>`;
    }
  }

  // --- PREMIUM UI HELPERS ---
  function showToast(msg, theme='success') {
    if (window.parent && window.parent.postMessage) {
        window.parent.postMessage({ type: 'toast', message: msg, theme: theme }, '*');
    } else alert(msg);
  }

  let activeConfirmId = null;
  let activeConfirmCallback = null;
  function showConfirm(title, message, callback) {
    const id = Date.now();
    activeConfirmId = id;
    activeConfirmCallback = callback;
    if (window.parent && window.parent.postMessage) {
        window.parent.postMessage({ type: 'confirmRequest', title, message, requestId: id }, '*');
    } else {
        if (confirm(message)) callback(true);
        else callback(false);
    }
  }

  window.addEventListener('message', e => {
    const data = e.data;
    if (data && data.type === 'changeTheme') {
        document.documentElement.setAttribute('data-theme', data.theme);
    } else if (data && data.type === 'confirmResponse' && data.requestId === activeConfirmId) {
        if (activeConfirmCallback) activeConfirmCallback(data.result);
        activeConfirmId = null;
        activeConfirmCallback = null;
    } else if (data && (data.type === 'tabActivated' || data.type === 'dataChanged')) {
        loadNotices(true);
    }
  });

  function setFilter(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter();
  }

  function applyFilter() {
    let filtered = [...allNotices];
    if (currentFilter !== 'all') filtered = filtered.filter(n=>n.muc_do === currentFilter);
    const q = document.getElementById('searchInput').value.toLowerCase();
    if (q) filtered = filtered.filter(n=>(n.tieu_de||'').toLowerCase().includes(q) || (n.noi_dung||'').toLowerCase().includes(q));
    renderNotices(filtered);
  }

  function formatRelativeTime(dateStr) {
    const d = new Date(dateStr);
    const diff = (new Date() - d) / 1000;
    if (diff < 60) return `Vừa xong`;
    if (diff < 3600) return `${Math.floor(diff/60)} phút trước`;
    if (diff < 86400) return `${Math.floor(diff/3600)} giờ trước`;
    return d.toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function renderNotices(data) {
    const feed = document.getElementById('noticeFeed');
    feed.innerHTML = '';
    
    if (data.length === 0) {
      feed.innerHTML = '<div style="text-align:center;padding:5rem;color:var(--text-dim)">Không có thông báo nào khớp với bộ lọc.</div>';
      return;
    }

    data.forEach((n, idx) => {
      const div = document.createElement('div');
      const mucDoCls = n.muc_do === 'Khẩn cấp' ? 'mucdo-khancap' : n.muc_do === 'Quan trọng' ? 'mucdo-quantrong' : 'mucdo-binhthuong';
      const icon = n.muc_do === 'Khẩn cấp' ? '🚨' : n.muc_do === 'Quan trọng' ? '⭐' : '📢';
      div.className = `notice-item-container ${mucDoCls}`;
      
      const isManager = ['manager','admin'].includes(ROLE.toLowerCase());
      const actionHtml = isManager ? `
        <div class="notice-actions">
          <button class="btn-icon" onclick="editNotice(${n.id})" title="Sửa"><i class="fas fa-edit"></i></button>
          <button class="btn-icon" style="color:var(--danger)" onclick="deleteNotice(${n.id})" title="Xóa"><i class="fas fa-trash"></i></button>
        </div>
      ` : '';

      div.innerHTML = `
        <div class="notice-card" style="animation-delay:${idx*0.06}s">
          <div class="notice-icon-wrap">${icon}</div>
          <div class="notice-content">
            <div class="notice-header">
              <div>
                <div class="notice-title">${n.tieu_de}</div>
                <div class="notice-meta">
                  <span><i class="fas fa-clock"></i> ${formatRelativeTime(n.created_at)}</span>
                  <span><i class="fas fa-user-circle"></i> ${n.nguoi_dang || 'Ban Quản Trị'}</span>
                </div>
              </div>
              ${actionHtml}
            </div>
            <div class="notice-body">${n.noi_dung}</div>
          </div>
        </div>
      `;
      feed.appendChild(div);
    });
  }

  function openModal(editData=null) {
    document.getElementById('noticeForm').reset();
    document.getElementById('editId').value = '';
    document.getElementById('muc_do').value = 'Bình thường';
    if (editData) {
      document.getElementById('modalTitle').innerText = 'Sửa Thông Báo';
      document.getElementById('editId').value = editData.id;
      ['tieu_de','muc_do','noi_dung'].forEach(f=>{
        const el = document.getElementById(f); if(el) el.value = editData[f]||'';
      });
    } else {
      document.getElementById('modalTitle').innerText = 'Đăng Thông Báo';
    }
    document.getElementById('noticeModal').classList.add('active');
  }

  function closeModal() { document.getElementById('noticeModal').classList.remove('active'); }
  function editNotice(id) { const t = allNotices.find(x=>x.id===id); if(t) openModal(t); }

  async function deleteNotice(id) {
    showConfirm("Xác nhận xóa?", "Hành động này không thể hoàn tác. Tiếp tục?", async (res) => {
        if (!res) return;
        const oldItem = allNotices.find(x=>x.id===id);
        const { error } = await _supabase.from('thongbao').delete().eq('id', id);
        if (!error) {
            logAudit('thongbao', id, 'DELETE', oldItem, null);
            showToast("Đã xóa thông báo thành công!");
            loadNotices();
            safeNotifyParent();
        } else showToast('Lỗi: ' + error.message, 'error');
    });
  }

  document.getElementById('noticeForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('saveBtn');
    btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
    const id = document.getElementById('editId').value;
    const payload = {
      tieu_de: document.getElementById('tieu_de').value.trim(),
      noi_dung: document.getElementById('noi_dung').value.trim(),
      muc_do: document.getElementById('muc_do').value
    };
    if (!id) payload.nguoi_dang = USER_NAME;
    
    try {
      let res;
      if (id) {
          res = await _supabase.from('thongbao').update(payload).eq('id', id);
      } else {
          res = await _supabase.from('thongbao').insert([payload]).select();
      }
      if (res.error) throw res.error;
      
      const oldItem = id ? allNotices.find(x=>x.id == id) : null;
      const recordId = id || (res.data && res.data[0] ? res.data[0].id : 'new');
      logAudit('thongbao', recordId, id ? 'UPDATE' : 'INSERT', oldItem, payload);
      
      closeModal(); 
      loadNotices();
      safeNotifyParent();
      showToast(id ? "Cập nhật thành công!" : "Đã đăng thông báo mới!");
    } catch(err) { showToast('Lỗi: '+err.message, 'error'); }
    finally { btn.disabled=false; btn.innerHTML='Đăng Thông Báo'; }
  };

  document.addEventListener('DOMContentLoaded', () => {
    const role = (ROLE || '').toLowerCase();
    if (['manager','admin'].includes(role)) {
      document.querySelectorAll('.manager-only').forEach(el=>el.style.display='flex');
    }
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    loadNotices();
    // Realtime channel
    _supabase.channel('thongbao-changes').on('postgres_changes', { event: '*', schema: 'public', table: 'thongbao' }, () => loadNotices(true)).subscribe();
  });
</script>
</body>
</html>
