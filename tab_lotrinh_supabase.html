<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lộ Trình Thông Minh - Quản lý Đội Xe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #00ffcc;
            --bg: #0b0f1a;
            --card-bg: rgba(23, 32, 53, 0.8);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #f43f5e;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --panel-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        [data-theme='light'] {
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text: #0f172a;
            --text-dim: #64748b;
            --glass: rgba(0, 0, 0, 0.03);
            --glass-border: rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            padding: 25px;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 40%);
        }

        /* Header */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 25px;
        }

        .title-group h2 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 25px;
            height: calc(100vh - 140px);
        }

        /* Left Side */
        .side-panel {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: var(--panel-shadow);
            backdrop-filter: blur(10px);
        }

        .search-box i {
            position: absolute;
            left: 18px;
            top: 16px;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .search-box input {
            width: 100%;
            padding: 14px 15px 14px 48px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }

        .points-list {
            overflow-y: auto;
            padding-right: 5px;
        }

        .point-item {
            padding: 15px;
            border: 1px solid transparent;
            border-radius: 18px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: var(--glass);
        }

        .point-item:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .point-item h4 {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .point-item p {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        /* Right Side */
        .route-panel {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px;
            overflow-y: auto;
            box-shadow: var(--panel-shadow);
            backdrop-filter: blur(10px);
        }

        /* Modern Visual Flow */
        .visual-flow {
            background: rgba(0, 0, 0, 0.2);
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 30px;
            overflow-x: auto;
            display: flex;
            align-items: center;
            gap: 0;
            border: 1px solid var(--glass-border);
        }

        .flow-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 100px;
            position: relative;
        }

        .flow-node .circle {
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--primary);
            margin-bottom: 10px;
            z-index: 2;
            border: 3px solid var(--bg);
        }

        .flow-node.start .circle {
            background: var(--success);
            box-shadow: 0 0 12px var(--success);
        }

        .flow-node.end .circle {
            background: var(--danger);
            box-shadow: 0 0 12px var(--danger);
        }

        .flow-node .node-title {
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text);
            text-align: center;
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .flow-node .node-time {
            font-weight: 800;
            font-size: 0.75rem;
            color: var(--accent);
            margin-top: 4px;
        }

        .flow-arrow {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
            position: relative;
            margin: 0 -5px;
        }

        .flow-arrow .arrow-text {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .flow-arrow .line {
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            opacity: 0.3;
        }

        .flow-arrow .arrow-time-bottom {
            margin-top: 4px;
            font-size: 0.7rem;
            color: var(--text-dim);
            font-weight: 700;
        }

        /* Summary Grid */
        .route-summary {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
            padding: 20px;
            border-radius: 20px;
            text-align: left;
            border: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: 0.3s;
        }

        .summary-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .summary-card .label {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-weight: 700;
            letter-spacing: 1px;
        }

        .summary-card .value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .summary-card i {
            font-size: 1.4rem;
            color: var(--primary);
            margin-bottom: 5px;
        }

        /* Stop Cards */
        .stop-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
            gap: 20px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stop-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 6px;
            background: var(--primary);
        }

        .stop-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--glass-border);
        }

        .stop-number {
            width: 38px;
            height: 38px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
            cursor: grab;
        }

        .stop-header h4 {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .stop-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .input-box label {
            font-size: 0.7rem;
            color: var(--text-dim);
            font-weight: 700;
            margin-bottom: 6px;
            display: block;
        }

        .input-box input {
            width: 100%;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 10px 14px;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            transition: 0.2s;
        }

        .input-box input:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
        }

        .input-box input[readonly] {
            background: transparent;
            border-color: transparent;
            color: var(--danger);
            font-weight: 800;
            font-size: 1.1rem;
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border-radius: 16px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-success {
            background: linear-gradient(135deg, #059669, #10b981);
            color: white;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }

        .btn:active {
            transform: scale(0.95);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header-section {
                display: none;
            }

            /* Hide entire header section on mobile to save space */

            .main-layout {
                grid-template-columns: 1fr;
                height: auto;
                gap: 15px;
            }

            .side-panel {
                display: flex;
                height: 320px;
                border-radius: 20px;
            }

            .points-list {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .point-item {
                padding: 10px;
                border-radius: 12px;
                margin-bottom: 0;
            }

            .point-item h4 {
                font-size: 0.8rem;
            }

            .point-item p {
                font-size: 0.65rem;
            }

            .route-panel {
                padding: 15px;
                border-radius: 20px;
            }

            .visual-flow {
                margin-left: -15px;
                margin-right: -15px;
                border-radius: 0;
                padding: 15px;
            }

            .route-summary {
                gap: 10px;
                margin-bottom: 20px;
            }

            .summary-card {
                padding: 10px;
                gap: 4px;
            }

            .summary-card i {
                font-size: 1rem;
            }

            .summary-card .label {
                font-size: 0.6rem;
            }

            .summary-card .value {
                font-size: 1rem;
            }

            #stopsContainer {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .stop-item {
                padding: 12px;
                border-radius: 15px;
                flex-direction: column;
                gap: 10px;
                min-height: 180px;
                align-items: stretch;
            }

            .stop-number {
                width: 25px;
                height: 25px;
                font-size: 0.7rem;
            }

            .stop-header h4 {
                font-size: 0.85rem;
            }

            .stop-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
                margin-top: 8px;
            }

            .input-box input {
                padding: 6px 8px;
                font-size: 0.75rem;
                border-radius: 8px;
            }

            .input-box input[readonly] {
                font-size: 0.85rem;
            }

            .btn-del {
                position: absolute;
                right: 8px;
                top: 8px;
                padding: 5px;
                font-size: 0.8rem;
            }
        }

        @media (min-width: 1024px) {
            #stopsContainer {
                display: block;
            }

            /* Single column on Desktop for better readability */
        }

        @media (max-width: 480px) {
            #stopsContainer {
                grid-template-columns: 1fr;
            }

            /* 1 column on very small phones */
        }

        /* Map Styles */
        #map {
            width: 100%;
            height: 350px;
            border-radius: 24px;
            margin-bottom: 25px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 10;
        }

        .leaflet-container {
            background: #111b2d !important;
        }

        /* Route Name Input */
        #routeName {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 12px 18px;
            color: white;
            font-family: inherit;
            font-weight: 600;
            width: 280px;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        #routeName:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.25);
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc2626, #f43f5e);
            color: white;
            box-shadow: 0 10px 20px rgba(244, 63, 94, 0.2);
        }
    </style>
</head>

<body>

    <div class="header-section">
        <div class="title-group">
            <h2>LỘ TRÌNH VẬN CHUYỂN</h2>
            <p style="color:var(--text-dim); font-size:0.85rem; font-weight:500;">Xây dựng & tối ưu hóa tuyến đường
                chuyên nghiệp</p>
        </div>
        <div style="display:flex; gap:12px; align-items:center;">
            <input type="text" id="routeName" placeholder="Tên lộ trình (Ví dụ: Miền Nam-Đà Lạt)...">
            <button class="btn btn-danger" onclick="clearAllStops()"><i class="fas fa-trash-alt"></i> XOÁ HẾT</button>
            <button class="btn btn-primary" onclick="recalculateAll(true)"><i class="fas fa-magic"></i> TÍNH TOÁN
                LẠI</button>
            <button class="btn btn-success" onclick="saveToSupabase()"><i class="fas fa-save"></i> LƯU DỮ LIỆU</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="side-panel">
            <div class="search-box" style="position:relative;">
                <i class="fas fa-search"></i>
                <input type="text" id="pointSearch" placeholder="Tìm kiếm điểm kho..." oninput="filterPoints()">
            </div>
            <div class="points-list" id="pointsList"></div>
        </div>

        <div class="route-panel">
            <!-- Bản đồ lộ trình trực quan -->
            <div id="map"></div>

            <div class="visual-flow" id="visualFlow">
                <p style="text-align:center; width:100%; color:var(--text-dim); font-weight:600;">HÃY CHỌN CÁC ĐIỂM ĐỂ
                    BẮT ĐẦU TUYẾN ĐƯỜNG</p>
            </div>

            <div class="route-summary">
                <div class="summary-card">
                    <i class="fas fa-road"></i>
                    <div class="label">QUÃNG ĐƯỜNG TỔNG</div>
                    <div class="value" id="resDistance">0 KM</div>
                </div>
                <div class="summary-card">
                    <i class="fas fa-stopwatch"></i>
                    <div class="label">THỜI GIAN CHẠY</div>
                    <div class="value" id="resTime">0 Phút</div>
                </div>
                <div class="summary-card">
                    <i class="fas fa-flag-checkered"></i>
                    <div class="label">KẾT THÚC DỰ KIẾN</div>
                    <div class="value" id="resEnd">--:--</div>
                </div>
            </div>

            <div id="stopsContainer"></div>
        </div>
    </div>

    <script>
        function clearAllStops() {
            if (confirm("Bạn có chắc chắn muốn xóa")) {
                document.getElementById('stopsContainer').innerHTML = '';
                document.getElementById('routeName').value = '';
                recalculateAll();
            }
        }
        const SUPABASE_URL = "https://mpuqcmektepsqsazuvtb.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wdXFjbWVrdGVwc3FzYXp1dnRiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzE0NjU5OCwiZXhwIjoyMDg4NzIyNTk4fQ.eBWCfXV5v4SNSICYg_wVwaez9ycRk7-XmTry7UnHTU8";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allPoints = [];
        const IS_MANAGER = (sessionStorage.getItem('role') || 'taixe').toLowerCase() !== 'taixe';
        let AVG_SPEED = 45; // Vận tốc trung bình 45km/h

        new Sortable(document.getElementById('stopsContainer'), {
            animation: 150, handle: '.stop-number', ghostClass: 'sortable-ghost',
            onEnd: () => recalculateAll()
        });

        document.addEventListener('DOMContentLoaded', loadData);

        async function loadData() {
            const { data, error } = await _supabase.from('diemgiaohang').select('*').order('ten_diem');
            if (error) return console.error(error);
            allPoints = data || [];
            renderPointsList(allPoints);
        }

        function renderPointsList(data) {
            const list = document.getElementById('pointsList');
            list.innerHTML = data.map(p => {
                const lat = p.lat || parseUrl(p.link_google_map || p.dia_chi)?.lat || "";
                const lng = p.lng || parseUrl(p.link_google_map || p.dia_chi)?.lng || "";
                const cleanName = (p.ten_diem || "").replace(/'/g, "\\'");
                return `<div class="point-item" onclick="addStop('${p.id}', '${cleanName}', '${lat}', '${lng}')">
                    <h4>${p.ten_diem}</h4><p>${p.dia_chi || '---'}</p></div>`;
            }).join('');
        }

        function filterPoints() {
            const q = document.getElementById('pointSearch').value.toLowerCase();
            renderPointsList(allPoints.filter(p => p.ten_diem.toLowerCase().includes(q) || (p.dia_chi || "").toLowerCase().includes(q)));
        }

        function parseUrl(url) {
            if (!url) return null;
            let m = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/) || url.match(/q=(-?\d+\.\d+),(-?\d+\.\d+)/) || url.match(/place\/(-?\d+\.\d+),(-?\d+\.\d+)/);
            return m ? { lat: parseFloat(m[1]), lng: parseFloat(m[2]) } : null;
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            if (!lat1 || !lon1 || !lat2 || !lon2) return 0;
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)) * 1.3).toFixed(1);
        }

        function handleDistInput(inp) {
            const dist = parseFloat(inp.value) || 0;
            const timeInp = inp.closest('.stop-grid').querySelector('.inp-next-time');
            if (timeInp) {
                timeInp.value = Math.round((dist / AVG_SPEED) * 60);
            }
            recalculateAll();
        }

        function addStop(id, name, lat, lng) {
            const div = document.createElement('div');
            div.className = 'stop-item';
            div.dataset.lat = lat; div.dataset.lng = lng;
            div.innerHTML = `
                <div class="stop-number"></div>
                <div class="stop-main">
                    <div class="stop-header"><h4>${name}</h4><span class="badge stop-badge">ĐIỂM GIAO</span></div>
                    <div class="stop-grid">
                        <div class="input-box"><label class="time-label">Giờ...</label><input type="text" class="inp-time-range" oninput="recalculateAll()" readonly></div>
                        <div class="input-box box-stay"><label>Dừng (P)</label><input type="number" class="inp-stay" value="10" oninput="recalculateAll()"></div>
                        <div class="input-box box-next-dist"><label>Chặng tiếp (KM)</label><input type="number" class="inp-next-dist" oninput="handleDistInput(this)"></div>
                        <div class="input-box box-next-time"><label>TG Chạy (P)</label><input type="number" class="inp-next-time" oninput="recalculateAll()"></div>
                    </div>
                </div>
                <div class="btn-del" onclick="this.parentElement.remove(); recalculateAll();"><i class="fas fa-trash"></i></div>`;
            document.getElementById('stopsContainer').appendChild(div);
            recalculateAll(true);
        }

        async function recalculateAll(forceAuto = false) {
            const stops = document.querySelectorAll('.stop-item');
            if (stops.length === 0) {
                document.getElementById('visualFlow').innerHTML = '<p style="text-align:center; width:100%; color:var(--text-dim); font-weight:600;">HÃY CHỌN CÁC ĐIỂM ĐỂ BẮT ĐẦU TUYẾN ĐƯỜNG</p>';
                document.getElementById('resDistance').innerText = '0 KM';
                document.getElementById('resTime').innerText = '0 Phút';
                document.getElementById('resEnd').innerText = '--:--';
                if (routeLayer) map.removeLayer(routeLayer);
                markers.forEach(m => map.removeLayer(m));
                markers = [];
                return;
            }
            if (forceAuto) showToast("Đang tính toán tuyến đường thực tế qua OSRM...", "warning");

            let totalDist = 0; let totalTravelTime = 0;
            const startNode = stops[0];
            const startInp = startNode.querySelector('.inp-time-range');
            if (IS_MANAGER) {
                if (startInp.type !== 'time') {
                    startInp.type = 'time';
                    if (!startInp.value) startInp.value = "08:00";
                    startInp.readOnly = false;
                }
            }
            const [h, m] = (startInp.value || "08:00").split(':');
            let runningTime = new Date(); runningTime.setHours(parseInt(h), parseInt(m), 0);

            // Collect coordinates for OSRM
            const coords = Array.from(stops).map(s => {
                const lat = parseFloat(s.dataset.lat);
                const lng = parseFloat(s.dataset.lng);
                return (lat && lng) ? `${lng},${lat}` : null;
            }).filter(c => c !== null);

            let routeData = null;
            if (coords.length >= 2 && forceAuto) {
                try {
                    const url = `https://router.project-osrm.org/route/v1/driving/${coords.join(';')}?overview=full&geometries=geojson&steps=true`;
                    const resp = await fetch(url);
                    const json = await resp.json();
                    if (json.code === 'Ok') {
                        routeData = json.routes[0];
                    }
                } catch (err) {
                    console.error("OSRM Error:", err);
                    showToast("Lỗi kết nối OSRM, dùng tạm tính toán ước lượng", "error");
                }
            }

            stops.forEach((stop, i) => {
                const isLast = i === stops.length - 1;
                updateStopUI(stop, i, stops.length);
                if (i === 0 && !startInp.value) stop.querySelector('.inp-time-range').value = runningTime.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', hour12: false });

                if (!isLast) {
                    const next = stops[i + 1];
                    const dInp = stop.querySelector('.inp-next-dist');
                    const tInp = stop.querySelector('.inp-next-time');

                    if (routeData && routeData.legs && routeData.legs[i]) {
                        // Use OSRM real data
                        const leg = routeData.legs[i];
                        dInp.value = (leg.distance / 1000).toFixed(1);
                        tInp.value = Math.round(leg.duration / 60);
                    } else if (forceAuto || !dInp.value) {
                        // Fallback to Haversine
                        const d = calculateDistance(stop.dataset.lat, stop.dataset.lng, next.dataset.lat, next.dataset.lng);
                        dInp.value = d; tInp.value = Math.round((d / AVG_SPEED) * 60);
                    }

                    totalDist += parseFloat(dInp.value || 0); totalTravelTime += parseFloat(tInp.value || 0);
                    runningTime = new Date(runningTime.getTime() + parseFloat(tInp.value || 0) * 60000);
                    const arrivalStr = runningTime.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', hour12: false });
                    const stay = parseInt(next.querySelector('.inp-stay').value) || 0;

                    if (i + 1 < stops.length - 1) {
                        const departTime = new Date(runningTime.getTime() + stay * 60000);
                        next.querySelector('.inp-time-range').value = `${arrivalStr.replace(':', '')}-${departTime.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', hour12: false }).replace(':', '')}`;
                        runningTime = departTime;
                    } else { next.querySelector('.inp-time-range').value = arrivalStr; }
                }
            });

            document.getElementById('resDistance').innerText = totalDist.toFixed(1) + ' KM';
            document.getElementById('resTime').innerText = totalTravelTime + ' Phút';
            document.getElementById('resEnd').innerText = runningTime.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', hour12: false });
            renderVisualFlow(stops);
            updateMap(stops, routeData?.geometry);
        }

        function updateStopUI(item, i, total) {
            const badge = item.querySelector('.stop-badge');
            const boxStay = item.querySelector('.box-stay');
            const boxDist = item.querySelector('.box-next-dist');
            const boxTime = item.querySelector('.box-next-time');
            if (i === 0) {
                item.style.borderLeftColor = 'var(--success)'; badge.innerText = 'XUẤT PHÁT'; badge.style.background = 'var(--success)';
                boxStay.style.display = 'none'; boxDist.style.display = 'flex'; boxTime.style.display = 'flex';
            } else if (i === total - 1) {
                item.style.borderLeftColor = 'var(--danger)'; badge.innerText = 'KẾT THÚC'; badge.style.background = 'var(--danger)';
                boxStay.style.display = 'none'; boxDist.style.display = 'none'; boxTime.style.display = 'none';
            } else {
                item.style.borderLeftColor = 'var(--primary)'; badge.innerText = 'ĐIỂM GIAO'; badge.style.background = 'var(--primary)';
                boxStay.style.display = 'flex'; boxDist.style.display = 'flex'; boxTime.style.display = 'flex';
            }
        }

        function renderVisualFlow(stops) {
            let html = '';
            stops.forEach((s, i) => {
                const isFirst = i === 0;
                const isLast = i === stops.length - 1;
                const nodeClass = isFirst ? 'start' : (isLast ? 'end' : '');

                html += `
                    <div class="flow-node ${nodeClass}">
                        <div class="circle"></div>
                        <div class="node-title">${s.querySelector('h4').innerText}</div>
                        <div class="node-time">${s.querySelector('.inp-time-range').value}</div>
                    </div>
                `;

                if (i < stops.length - 1) {
                    const dist = s.querySelector('.inp-next-dist').value || '0';
                    const time = s.querySelector('.inp-next-time').value || '0';
                    html += `
                        <div class="flow-arrow">
                            <div class="arrow-text">${dist}</div>
                            <div class="line"></div>
                            <div class="arrow-time-bottom">${time}</div>
                        </div>
                    `;
                }
            });
            document.getElementById('visualFlow').innerHTML = html;
        }

        function showToast(msg, type = 'success') {
            if (window.parent && window.parent.postMessage) {
                window.parent.postMessage({ type: 'toast', message: msg, theme: type }, '*');
            } else {
                console.log(`[Toast] ${type}: ${msg}`);
            }
        }

        let map, routeLayer, markers = [];

        async function initMap() {
            map = L.map('map').setView([10.762622, 106.660172], 10); // Center on HCM
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            // Custom Dark Theme for Leaflet
            document.querySelector('.leaflet-tile-container').style.filter = 'invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%)';
        }

        async function updateMap(stops, geometry = null) {
            if (!map) return;

            // Clear old markers/layers
            if (routeLayer) map.removeLayer(routeLayer);
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            const latlngs = [];
            const stopIcons = {
                start: L.divIcon({ className: 'custom-div-icon', html: "<div style='background:#10b981; width:12px; height:12px; border-radius:50%; border:2px solid white; box-shadow:0 0 10px #10b981'></div>", iconSize: [12, 12] }),
                mid: L.divIcon({ className: 'custom-div-icon', html: "<div style='background:#6366f1; width:10px; height:10px; border-radius:50%; border:2px solid white; box-shadow:0 0 10px #6366f1'></div>", iconSize: [10, 10] }),
                end: L.divIcon({ className: 'custom-div-icon', html: "<div style='background:#f43f5e; width:12px; height:12px; border-radius:50%; border:2px solid white; box-shadow:0 0 10px #f43f5e'></div>", iconSize: [12, 12] })
            };

            stops.forEach((s, i) => {
                const lat = parseFloat(s.dataset.lat);
                const lng = parseFloat(s.dataset.lng);
                if (lat && lng) {
                    const pos = [lat, lng];
                    latlngs.push(pos);

                    let icon = stopIcons.mid;
                    if (i === 0) icon = stopIcons.start;
                    else if (i === stops.length - 1) icon = stopIcons.end;

                    const marker = L.marker(pos, { icon: icon }).addTo(map)
                        .bindPopup(`<b>${i + 1}. ${s.querySelector('h4').innerText}</b>`);
                    markers.push(marker);
                }
            });

            if (geometry) {
                // Draw real road path from OSRM
                routeLayer = L.geoJSON(geometry, {
                    style: {
                        color: '#6366f1',
                        weight: 6,
                        opacity: 0.9,
                        lineJoin: 'round'
                    }
                }).addTo(map);
                map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });
            } else if (latlngs.length > 1) {
                // Fallback to straight lines
                routeLayer = L.polyline(latlngs, {
                    color: '#6366f1',
                    weight: 4,
                    opacity: 0.8,
                    dashArray: '10, 10',
                    lineJoin: 'round'
                }).addTo(map);
                map.fitBounds(routeLayer.getBounds(), { padding: [50, 50] });
            } else if (latlngs.length === 1) {
                map.setView(latlngs[0], 13);
            }
        }

        async function saveToSupabase() {
            const stopsElements = document.querySelectorAll('.stop-item');
            if (stopsElements.length === 0) {
                showToast("Vui lòng thêm ít nhất 1 điểm dừng!", "error");
                return;
            }

            const nameInput = document.getElementById('routeName');
            const routeName = nameInput.value.trim() || "Lộ Trình Mới";
            const mnv = sessionStorage.getItem('mnv') || "Unknown";

            const stopsData = [];
            stopsElements.forEach(el => {
                stopsData.push({
                    name: el.querySelector('h4').innerText,
                    lat: el.dataset.lat,
                    lng: el.dataset.lng,
                    time_range: el.querySelector('.inp-time-range').value,
                    stay_min: el.querySelector('.inp-stay').value,
                    next_dist_km: el.querySelector('.inp-next-dist').value,
                    next_time_min: el.querySelector('.inp-next-time').value
                });
            });

            const totalKm = parseFloat(document.getElementById('resDistance').innerText) || 0;
            const totalMin = parseInt(document.getElementById('resTime').innerText) || 0;

            function showToast(msg, type = 'success') {
                if (window.parent && window.parent.postMessage) {
                    window.parent.postMessage({ type: 'toast', message: msg, theme: type }, '*');
                } else alert(msg);
            }

            function logAudit(tableName, recordId, action, oldData, newData) {
                if (window.parent && window.parent.postMessage) {
                    window.parent.postMessage({ 
                        type: 'logAudit', 
                        tableName, recordId, action, oldData, newData 
                    }, '*');
                }
            }

            showToast("Đang kết nối database...", "warning");

            try {
                const { data, error } = await _supabase.from('lotrinh').insert([{
                    ten_lotrinh: routeName,
                    ma_nv: mnv,
                    stops: stopsData,
                    tong_km: totalKm,
                    tong_phut: totalMin,
                    ngay_lap: new Date().toISOString().split('T')[0]
                }]).select();

                if (error) {
                    if (error.code === '42P01') {
                        showToast("Lỗi: Bảng 'lotrinh' chưa tồn tại. Vui lòng chạy file SQL trước!", "error");
                    } else {
                        throw error;
                    }
                } else {
                    // Ghi log Audit
                    if (data) {
                        logAudit('lotrinh', data[0].id, 'INSERT', null, {
                            ten_lotrinh: routeName,
                            stops_count: stopsData.length,
                            tong_km: totalKm
                        });
                    }
                    showToast(`Đã lưu lộ trình "${routeName}" thành công!`, "success");
                    nameInput.value = "";
                }
            } catch (err) {
                console.error("Save error:", err);
                showToast("Lỗi khi lưu: " + err.message, "error");
            }
        }

        window.addEventListener('message', (e) => {
            const data = e.data;
            if (data && data.type === 'tabActivated') {
                // Resize map when tab is shown to fix rendering bugs
                if (map) setTimeout(() => map.invalidateSize(), 300);
            }
        });

        // Initialize things
        (async () => {
            await initMap();
            await loadData();
        })();
            window.addEventListener('message', (e) => {
                const data = e.data;
                if (data && data.type === 'changeTheme') {
                    document.documentElement.setAttribute('data-theme', data.theme);
                }
            });

            document.addEventListener('DOMContentLoaded', () => {
                const savedTheme = localStorage.getItem('theme') || 'dark';
                document.documentElement.setAttribute('data-theme', savedTheme);
            });
        </script>
</body>
