<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nhật ký Vận hành - Fleet Core Supabase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #00ffcc;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo-area h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-area p {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .search-box {
            position: relative;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 0.5rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 250px;
            font-size: 1rem;
            margin-left: 10px;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-add:hover {
            transform: scale(1.05) translateY(-2px);
        }

        .btn-refresh {
            background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid rgba(255,255,255,0.1); 
            padding: 8px 16px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; 
            font-size: 0.85rem; display: flex; align-items: center; gap: 8px;
        }
        .btn-refresh:hover { background: rgba(255,255,255,0.1); color: white; transform: translateY(-2px); }
        .btn-refresh i { transition: transform 0.4s; }
        .btn-refresh:hover i { transform: rotate(180deg); }

        .control-btns { display: flex; gap: 10px; }

        /* Timeline / Grid */
        .log-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.5rem;
            padding-bottom: 5rem;
        }

        .log-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            animation: slideUp 0.5s ease-out forwards;
            opacity: 0;
        }

        /* Card có sự cố — viền đỏ trái */
        .log-card.has-issue {
            border-left: 4px solid var(--danger);
        }

        .log-card.has-issue::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--danger), transparent);
        }

        /* Controls / Date Bar */
        .date-bar {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px;
            padding: 0.75rem 1.25rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
            margin-bottom: 1rem; backdrop-filter: blur(15px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .date-group { display: flex; flex-direction: column; gap: 4px; }
        .date-group label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
        .date-group input, .date-group select {
            background: rgba(15,23,42,0.6); border: 1px solid rgba(255,255,255,0.1);
            padding: 0.4rem 0.7rem; border-radius: 10px; color: white; outline: none;
            font-family: 'Outfit', sans-serif; font-size: 0.8rem; transition: all 0.2s;
        }
        .btn-refresh {
            background: var(--primary); color: white; border: none; padding: 0.5rem 1rem; border-radius: 10px;
            font-weight: 700; cursor: pointer; transition: all 0.3s; font-size: 0.85rem;
            display: flex; align-items: center; gap: 6px;
        }

        /* Filter bar */
        /* Filter Buttons */
        .filter-bar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:1rem; }
        .filter-btn {
            padding: 6px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: var(--text-dim); cursor: pointer;
            transition: all 0.2s; font-size: 0.75rem; font-weight: 600;
            display: flex; align-items: center; gap: 6px; white-space: nowrap;
        }
        .filter-btn .btn-badge {
            background: rgba(255,255,255,0.15); padding: 1px 6px; border-radius: 6px;
            font-size: 0.8rem; font-weight: 800; min-width: 18px; text-align: center;
            color: var(--accent); box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
        }
        .filter-btn.active { background: #6366f1; color: white; border-color: #6366f1; }
        .filter-btn.active .btn-badge { background: white; color: #6366f1; }
        .filter-btn:hover { background: rgba(255,255,255,0.12); }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .log-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        
        /* Cá nhân hóa */
        .my-log-card {
            border-top: 3px solid var(--accent) !important;
            background: rgba(0, 255, 204, 0.05) !important;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.1) !important;
        }
        .my-log-badge {
            position: absolute;
            top: 10px;
            right: 45px;
            background: var(--accent);
            color: #000;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 5;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .vehicle-tag {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 1.1rem;
        }

        .log-date {
            color: var(--text-dim);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .log-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            background: rgba(15, 23, 42, 0.3);
            padding: 1rem;
            border-radius: 12px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .info-value {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .issue-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-none {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .badge-issue {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1rem;
        }

        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary);
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: var(--primary);
            color: white;
        }

        .modal-actions {
            margin-top: 2rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .btn-save {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }


        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .hidden {
            display: none;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body { padding: 15px; }

            header {
                flex-direction: column;
                align-items: stretch;
                gap: 1.5rem;
                margin-bottom: 2.5rem;
                text-align: center;
            }

            .logo-area { display: none; }

            .controls {
                flex-direction: column;
                width: 100%;
                margin-left: 0 !important;
                gap: 1rem;
            }

            .search-box { width: 100%; }
            .search-box input { width: 100%; }

            .control-btns { 
                display: grid; 
                grid-template-columns: 1fr 1fr; 
                gap: 8px; 
                width: 100%; 
            }
            .btn-refresh, .btn-add { width: 100% !important; justify-content: center; margin: 0; }

            .date-bar {
                flex-direction: column;
                align-items: stretch;
                padding: 1rem;
            }

            .modal-content { padding: 1.5rem; width: 95%; max-width: 100%; border-radius: 20px; }
            .modal-content h2 { font-size: 1.5rem !important; }
            .form-grid { grid-template-columns: 1fr !important; gap: 10px !important; }
            .form-group { grid-column: span 1 !important; }

            .stats-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.6rem;
                margin-bottom: 1.2rem;
            }

            .stat-card { 
                padding: 0.8rem 0.5rem; 
                border-radius: 12px;
            }
            .stat-card h3 { 
                font-size: 0.65rem; 
                margin-bottom: 2px;
            }
            .stat-card .value { font-size: 1.3rem; }

            .filter-bar {
                justify-content: center;
                gap: 8px;
            }

            .log-grid {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }

            .log-card {
                padding: 1.2rem;
            }

            .form-grid {
                grid-template-columns: 1fr !important;
            }
            
            .modal-content {
                padding: 1.5rem;
                border-radius: 20px;
            }

            /* Mobile Table View Styles */
            .mobile-table-container {
                width: 100%;
                overflow-x: auto;
                background: var(--card-bg);
                border-radius: 15px;
                border: 1px solid rgba(255,255,255,0.05);
                margin-top: 10px;
            }
            .mobile-data-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 0.75rem;
                min-width: 500px;
            }
            .mobile-data-table th {
                text-align: left;
                padding: 12px 10px;
                background: rgba(255,255,255,0.03);
                color: var(--text-dim);
                font-weight: 700;
                text-transform: uppercase;
                font-size: 0.6rem;
                letter-spacing: 0.5px;
                border-bottom: 1px solid rgba(255,255,255,0.05);
            }
            .mobile-data-table td {
                padding: 12px 10px;
                border-bottom: 1px solid rgba(255,255,255,0.03);
                vertical-align: middle;
            }
            .mobile-data-table tr:last-child td { border-bottom: none; }
            .td-title { font-weight: 800; color: white; display: block; font-size: 0.85rem; }
            .td-sub { font-size: 0.6rem; color: var(--text-dim); }
            .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
            .dot.status-active { background: var(--success); box-shadow: 0 0 5px var(--success); }
            .dot.status-danger { background: var(--danger); box-shadow: 0 0 5px var(--danger); }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <div class="logo-area">
                <h1><i class="fas fa-book-open"></i> NHẬT KÝ</h1>
                <p>Nhật ký vận hành đội xe thời gian thực</p>
            </div>
            <div class="controls">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Tìm biển số, tài xế..." oninput="filterLogs()">
                </div>
                <div class="control-btns">
                    <button class="btn-refresh" onclick="loadLogs()">
                        <i class="fas fa-sync-alt"></i> Làm mới
                    </button>
                    <button class="btn-add" onclick="openModal()">
                        <i class="fas fa-plus"></i> TẠO NHẬT KÝ
                    </button>
                </div>
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:0.9rem; color:var(--text-dim); margin-left:1rem; user-select:none;">
                <input type="checkbox" id="chkOnlyMe" onchange="applyFilter()" style="width:18px;height:18px;cursor:pointer;"> <b>Của tôi</b>
            </label>
        </div>
        </header>


        <div class="date-bar">
            <div class="date-group">
                <label>Từ ngày</label>
                <input type="date" id="fromDate">
            </div>
            <div class="date-group">
                <label>Đến ngày</label>
                <input type="date" id="toDate">
            </div>
            <div class="date-group">
                <label>Thời điểm</label>
                <select id="quickRange" onchange="applyQuickRange()">
                    <option value="month" selected>Tháng này</option>
                    <option value="today">Hôm nay</option>
                    <option value="7">7 ngày qua</option>
                    <option value="30">30 ngày qua</option>
                    <option value="all">Tất cả các tháng</option>
                </select>
            </div>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" onclick="setFilter('all', this)">
                📋 TẤT CẢ <span class="btn-badge" id="btnCountAll">0</span>
            </button>
            <button class="filter-btn" onclick="setFilter('issue', this)">
                🔴 SỰ CỐ <span class="btn-badge" id="btnCountIssue">0</span>
            </button>
            <button class="filter-btn" onclick="setFilter('today', this)">
                🗓️ HÔM NAY <span class="btn-badge" id="btnCountToday">0</span>
            </button>
            <div class="filter-btn" style="cursor:default; background:rgba(0,255,204,0.05); border-color:rgba(0,255,204,0.1)">
                🚀 TỔNG KM: <span id="spanTotalKm" style="color:var(--accent); font-weight:800">0</span>
            </div>
        </div>

        <div class="log-grid" id="logGrid">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="logModal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem;">
                <div>
                    <h2 id="modalTitle" style="font-weight: 800; font-size: 1.8rem">Ghi Nhật Ký Mới</h2>
                    <p style="color: var(--text-dim)">Vui lòng xác nhận thông tin chuyến đi.</p>
                </div>
                <button class="btn-icon" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>

            <form id="logForm">
                <input type="hidden" id="editId">

                <h3
                    style="color: var(--primary); font-size: 0.9rem; margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px;">
                    THÔNG TIN CHUNG</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Biển Số Xe</label>
                        <input type="text" id="bien_so_xe" list="vehicleList" required placeholder="Chọn xe..." onchange="autoFillVehicleKm(this.value)">
                        <datalist id="vehicleList"></datalist>
                    </div>
                    <div class="form-group">
                        <label>Mã Tài Xế</label>
                        <input type="text" id="mnv" list="driverList" required placeholder="Nhập mã NV..."
                            onchange="autoFillDriver(this.value)">
                        <datalist id="driverList"></datalist>
                    </div>
                    <div class="form-group">
                        <label>Họ Tên Tài Xế</label>
                        <input type="text" id="tai_xe" readonly style="background: rgba(255,255,255,0.05)">
                    </div>
                    <div class="form-group">
                        <label>Ngày Vận Hành</label>
                        <input type="date" id="ngay_van_hanh" required>
                    </div>
                    <div class="form-group">
                        <label>Chuyến Số</label>
                        <select id="chuyen_so">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3">3</option>
                            <option value="4">4</option>
                            <option value="5">5</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Loại Tuyến</label>
                        <select id="loai_chuyen">
                            <option value="Tuyến chính">Tuyến chính</option>
                            <option value="Tuyến nhánh">Tuyến nhánh</option>
                            <option value="Tăng cường">Tăng cường</option>
                        </select>
                    </div>
                </div>

                <h3
                    style="color: var(--primary); font-size: 0.9rem; margin: 2rem 0 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px;">
                    THỜI GIAN & QUÃNG ĐƯỜNG</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Giờ Xuất</label>
                        <input type="time" id="gio_xuat" onchange="calcLogic()">
                    </div>
                    <div class="form-group">
                        <label>Giờ Về</label>
                        <input type="time" id="gio_ve" onchange="calcLogic()">
                    </div>
                    <div class="form-group">
                        <label>Tổng Giờ (Tự động)</label>
                        <input type="text" id="tong_gio" readonly placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label>KM Xuất</label>
                        <input type="number" id="km_xuat" oninput="calcLogic()" placeholder="Nhập KM đầu...">
                    </div>
                    <div class="form-group">
                        <label>KM Về</label>
                        <input type="number" id="km_ve" oninput="calcLogic()" placeholder="Nhập KM cuối...">
                    </div>
                    <div class="form-group">
                        <label>Tổng KM (Tự động)</label>
                        <input type="text" id="tong_km" readonly placeholder="0">
                    </div>
                </div>

                <h3
                    style="color: var(--primary); font-size: 0.9rem; margin: 2rem 0 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px;">
                    SỰ CỐ & GHI CHÚ</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Có sự cố?</label>
                        <select id="suco_toggle" onchange="toggleSuCoField()">
                            <option value="khong">Không</option>
                            <option value="co">Có</option>
                        </select>
                    </div>
                    <div class="form-group" style="grid-column: span 2">
                        <label>Vấn đề phát sinh</label>
                        <input type="text" id="van_de_phat_sinh" placeholder="Nêu vấn đề nếu có...">
                    </div>
                    <div class="form-group">
                        <label>Đánh giá mức độ</label>
                        <select id="tu_danh_gia">
                            <option value="">-- Chọn mức độ --</option>
                            <option value="Bình thường">Bình thường</option>
                            <option value="Nhẹ">Nhẹ</option>
                            <option value="Trung bình">Trung bình</option>
                            <option value="Nặng">Nặng</option>
                        </select>
                    </div>
                    <div class="form-group" style="grid-column: span 2">
                        <label>Đề xuất xử lý (PA)</label>
                        <input type="text" id="de_xuat_pa" placeholder="Hướng xử lý...">
                    </div>
                    <div class="form-group" style="grid-column: span 3">
                        <label>Ghi chú thêm</label>
                        <textarea id="ghi_chu" rows="2"></textarea>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-icon" style="width: auto; padding: 0 1.5rem"
                        onclick="closeModal()">Đóng</button>
                    <button type="submit" class="btn-save" id="saveBtn">Lưu Nhật Ký</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://mpuqcmektepsqsazuvtb.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wdXFjbWVrdGVwc3FzYXp1dnRiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzE0NjU5OCwiZXhwIjoyMDg4NzIyNTk4fQ.eBWCfXV5v4SNSICYg_wVwaez9ycRk7-XmTry7UnHTU8";

        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        let allLogs = [];
        let driversList = [];

        async function initialize() {
            applyQuickRange();
            
            // Check for auto-filter flag from profile
            if (sessionStorage.getItem('filterMeOnLoad') === '1') {
                const chk = document.getElementById('chkOnlyMe');
                if (chk) chk.checked = true;
                sessionStorage.removeItem('filterMeOnLoad');
            }

            await loadLogs();
            await loadDropdowns();
        }

        function applyQuickRange() {
            const val = document.getElementById('quickRange').value;
            const today = new Date();
            let from = new Date();
            
            if (val === 'all') {
                from = new Date('2020-01-01');
            } else if (val === 'month') {
                from.setDate(1);
            } else if (val === 'today') {
                // Today already set by let from = new Date()
            } else {
                from.setDate(today.getDate() - parseInt(val));
            }
            
            document.getElementById('fromDate').value = from.toISOString().split('T')[0];
            document.getElementById('toDate').value = today.toISOString().split('T')[0];
            
            if (allLogs.length > 0) loadLogs();
        }

        async function loadLogs(isSilent = false) {
            const grid = document.getElementById('logGrid');
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;

            if (!isSilent) grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 5rem;"><i class="fas fa-spinner fa-spin fa-2x"></i></div>';

            try {
                const { data, error } = await _supabase
                    .from('nhatky')
                    .select('*')
                    .gte('ngay_van_hanh', fromDate)
                    .lte('ngay_van_hanh', toDate)
                    .order('ngay_van_hanh', { ascending: false })
                    .order('created_at', { ascending: false });

                if (error) throw error;
                allLogs = data || [];
                applyFilter();
                updateStats(allLogs);
            } catch (error) {
                grid.innerHTML = `<div style="color: var(--danger)">Lỗi: ${error.message}</div>`;
            }
        }

        async function loadDropdowns() {
            // Load Vehicles
            const { data: xe } = await _supabase.from('xe').select('bien_so_xe');
            const xeList = document.getElementById('vehicleList');
            if (xe) xeList.innerHTML = xe.map(v => `<option value="${v.bien_so_xe}">`).join('');

            // Load Drivers
            const { data: taixe } = await _supabase.from('taixe').select('ma_nv, ho_ten');
            driversList = taixe || [];
            const txList = document.getElementById('driverList');
            if (taixe) txList.innerHTML = taixe.map(t => `<option value="${t.ma_nv}">${t.ho_ten}</option>`).join('');
        }

        function renderLogs(data) {
            const grid = document.getElementById('logGrid');
            const isMobile = window.innerWidth <= 768;
            grid.innerHTML = '';

            if (data.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-dim)">Chưa có nhật ký nào.</div>';
                return;
            }

            if (isMobile) {
                let html = `
                    <div class="mobile-table-container">
                        <table class="mobile-data-table">
                            <thead>
                                <tr>
                                    <th>Xe/Ngày</th>
                                    <th>Chuyến/Tài xế</th>
                                    <th>KM</th>
                                    <th>SS</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                `;
                const myMnv = sessionStorage.getItem('mnv');
                const isStaff = ['manager', 'admin'].includes((sessionStorage.getItem('role') || '').toLowerCase());
                data.forEach(log => {
                    const statusDot = log.suco_toggle === 'co' ? 'status-danger' : 'status-active';
                    html += `
                        <tr onclick="${(log.mnv === myMnv || isStaff) ? `editLog(${log.id})` : ''}">
                            <td><div class="td-title">${log.bien_so_xe}</div><div class="td-sub">${formatDate(log.ngay_van_hanh)}</div></td>
                            <td><div class="td-title" style="font-size:0.8rem">${log.loai_chuyen}</div><div class="td-sub">${log.tai_xe}</div></td>
                            <td><span style="font-weight:600">${Math.round(log.tong_km || 0).toLocaleString()}</span></td>
                            <td><span class="dot ${statusDot}"></span></td>
                            <td style="text-align:center">
                                <i class="fas fa-chevron-right" style="font-size:0.7rem; color:rgba(255,255,255,0.2)"></i>
                            </td>
                        </tr>
                    `;
                });
                html += `</tbody></table></div>`;
                grid.innerHTML = html;
                return;
            }

            const currentUser = {
                ma_nv: sessionStorage.getItem('mnv'),
                name: sessionStorage.getItem('name'),
                role: sessionStorage.getItem('role')
            };

            data.forEach((log, idx) => {
                const card = document.createElement('div');
                const isMyLog = (currentUser.ma_nv && log.mnv === currentUser.ma_nv);
                const hasIssue = log.suco_toggle === 'co';
                card.className = 'log-card' + (hasIssue ? ' has-issue' : '') + (isMyLog ? ' my-log-card' : '');
                card.style.animationDelay = `${idx * 0.04}s`;

                let badgeHtml = '';
                if (isMyLog) {
                    badgeHtml = `
                        <div class="my-log-badge">
                            <i class="fas fa-user-check"></i> CỦA TÔI
                        </div>
                    `;
                }

                const badgeClass = hasIssue ? 'badge-issue' : 'badge-none';
                const badgeIcon = hasIssue ? 'fa-exclamation-triangle' : 'fa-check-circle';
                const badgeText = hasIssue ? 'Có sự cố' : 'Hoạt động tốt';

                card.innerHTML = badgeHtml + `
                <div class="log-header">
                    <span class="vehicle-tag">${log.bien_so_xe}</span>
                    <span class="log-date">${formatDate(log.ngay_van_hanh)}</span>
                </div>
                
                <div class="log-info-grid">
                    <div class="info-item">
                        <span class="info-label">Tài xế</span>
                        <span class="info-value">${log.tai_xe}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Chuyến số</span>
                        <span class="info-value">${log.chuyen_so} - ${log.loai_chuyen}</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Giờ chạy</span>
                        <span class="info-value">${log.gio_xuat} → ${log.gio_ve} (${log.tong_gio}h)</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">KM vận hành</span>
                        <span class="info-value">${Math.round(log.tong_km || 0).toLocaleString()} KM</span>
                    </div>
                </div>

                <div class="issue-badge ${badgeClass}">
                    <i class="fas ${badgeIcon}"></i> ${badgeText}
                </div>

                ${hasIssue ? `<div style="font-size: 0.85rem; color: var(--danger); margin-top: -0.5rem"><b>Vấn đề:</b> ${log.van_de_phat_sinh}</div>` : ''}

                <div class="card-footer">
                    ${(isMyLog || ['manager', 'admin'].includes(currentUser.role?.toLowerCase())) ? `
                        <button class="btn-icon" onclick="editLog(${log.id})"><i class="fas fa-edit"></i></button>
                        <button class="btn-icon" style="color: var(--danger)" onclick="deleteLog(${log.id})"><i class="fas fa-trash"></i></button>
                    ` : '<span style="font-size:0.7rem; color:var(--text-dim)">Chế độ xem</span>'}
                </div>
            `;
                grid.appendChild(card);
            });
        }

        let currentFilter = 'all';

        function setFilter(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyFilter();
        }

        function applyFilter() {
            const today = new Date().toISOString().split('T')[0];
            const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString().split('T')[0];

            let filtered = [...allLogs];
            
            // Filter by Me
            const myMnv = sessionStorage.getItem('mnv');
            if (document.getElementById('chkOnlyMe').checked && myMnv) {
                filtered = filtered.filter(l => l.mnv === myMnv);
            }

            if (currentFilter === 'issue' || currentFilter === 'suco') filtered = filtered.filter(l => l.suco_toggle === 'co');
        else if (currentFilter === 'ok') filtered = filtered.filter(l => l.suco_toggle !== 'co');
        else if (currentFilter === 'today') filtered = filtered.filter(l => l.ngay_van_hanh === today);
        else if (currentFilter === 'week') filtered = filtered.filter(l => l.ngay_van_hanh >= weekAgo);

            const q = document.getElementById('searchInput').value.toLowerCase();
            if (q) filtered = filtered.filter(l =>
                (l.bien_so_xe || '').toLowerCase().includes(q) ||
                (l.tai_xe || '').toLowerCase().includes(q)
            );
            renderLogs(filtered);
        }

        function updateStats(data) {
            const total = data.length;
            const totalKm = data.reduce((sum, item) => sum + (parseFloat(item.tong_km) || 0), 0);
            const issueCount = data.filter(l => l.suco_toggle === 'co').length;
            const todayStr = new Date().toISOString().split('T')[0];
            const todayCount = data.filter(l => l.ngay_van_hanh === todayStr).length;

            document.getElementById('btnCountAll').innerText = total;
            document.getElementById('btnCountIssue').innerText = issueCount;
            document.getElementById('btnCountToday').innerText = todayCount;
            document.getElementById('spanTotalKm').innerText = Math.round(totalKm).toLocaleString('vi-VN') + ' km';
        }

        function autoFillDriver(mnv) {
            const driver = driversList.find(d => d.ma_nv === mnv);
            document.getElementById('tai_xe').value = driver ? driver.ho_ten : '';
        }

        async function autoFillVehicleKm(plate) {
            if (!plate) return;
            const { data } = await _supabase.from('nhatky').select('km_ve').eq('bien_so_xe', plate).order('km_ve', { ascending: false }).limit(1);
            if (data && data.length > 0) {
                const kx = document.getElementById('km_xuat');
                if (!kx.value || kx.value == 0) {
                    kx.value = data[0].km_ve;
                    calcLogic();
                }
            }
        }

        function calcLogic() {
            const gx = document.getElementById('gio_xuat').value;
            const gv = document.getElementById('gio_ve').value;
            const kx = parseFloat(document.getElementById('km_xuat').value) || 0;
            const kv = parseFloat(document.getElementById('km_ve').value) || 0;

            // Calc Hours
            if (gx && gv) {
                const start = new Date("1970-01-01T" + gx);
                const end = new Date("1970-01-01T" + gv);
                let diff = (end - start) / (1000 * 60 * 60);
                if (diff < 0) diff += 24;
                document.getElementById('tong_gio').value = diff.toFixed(2);
            }

            // Calc KM
            if (kv >= kx && kx > 0) {
                document.getElementById('tong_km').value = (kv - kx);
            } else {
                document.getElementById('tong_km').value = '0';
            }
        }

        function toggleSuCoField() {
            const toggle = document.getElementById('suco_toggle').value;
            const vd = document.getElementById('van_de_phat_sinh');
            const pa = document.getElementById('de_xuat_pa');
            const dg = document.getElementById('tu_danh_gia');

            if (toggle === 'co') {
                vd.required = true;
                vd.value = '';
                pa.value = '';
                dg.value = '';
            } else {
                vd.required = false;
                vd.value = 'Hoạt động bình thường';
                pa.value = 'Hoạt động bình thường';
                dg.value = 'Bình thường';
            }
        }

        function openModal(editData = null) {
            const form = document.getElementById('logForm');
            form.reset();
            document.getElementById('ngay_van_hanh').value = new Date().toISOString().split('T')[0];
            toggleSuCoField();

            if (editData) {
                document.getElementById('modalTitle').innerText = "Cập Nhật Nhật Ký";
                document.getElementById('editId').value = editData.id;
                const fields = [
                    'bien_so_xe', 'mnv', 'tai_xe', 'ngay_van_hanh', 'chuyen_so', 'loai_chuyen',
                    'gio_xuat', 'gio_ve', 'tong_gio', 'km_xuat', 'km_ve', 'tong_km',
                    'suco_toggle', 'van_de_phat_sinh', 'tu_danh_gia', 'de_xuat_pa', 'ghi_chu'
                ];
                fields.forEach(f => {
                    const el = document.getElementById(f);
                    if (el) el.value = editData[f] || '';
                });
        }
        document.getElementById('logModal').classList.add('active');
    }

    function showToast(msg, theme = 'success') {
        if (window.parent && window.parent.postMessage) {
            window.parent.postMessage({ type: 'toast', message: msg, theme: theme }, '*');
        } else {
            console.log("Toast:", msg);
        }
    }

    let activeConfirmId = null;
    let activeConfirmCallback = null;
    function showConfirm(title, message, callback) {
        if (window.parent && window.parent.postMessage) {
            activeConfirmId = Date.now();
            activeConfirmCallback = callback;
            window.parent.postMessage({ 
                type: 'confirmRequest', 
                title: title, 
                message: message, 
                requestId: activeConfirmId 
            }, '*');
        } else {
            if (confirm(message)) callback(true);
            else callback(false);
        }
    }

    function closeModal() { document.getElementById('logModal').classList.remove('active'); }

        document.getElementById('logForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;

            const fields = [
                'bien_so_xe', 'mnv', 'tai_xe', 'ngay_van_hanh', 'chuyen_so', 'loai_chuyen',
                'gio_xuat', 'gio_ve', 'tong_gio', 'km_xuat', 'km_ve', 'tong_km',
                'suco_toggle', 'van_de_phat_sinh', 'tu_danh_gia', 'de_xuat_pa', 'ghi_chu'
            ];

            const payload = { updated_at: new Date().toISOString() };
            fields.forEach(f => {
                const el = document.getElementById(f);
                if (el) {
                    if (el.type === 'number' || f.includes('tong_') || f.includes('km_')) {
                        payload[f] = Math.round(parseFloat(el.value) || 0);
                    } else {
                        payload[f] = el.value.trim() === '' ? null : el.value.trim();
                    }
                }
            });

            const id = document.getElementById('editId').value;
        try {
            if (id) {
                // Security check for update
                const existing = allLogs.find(l => l.id == id);
                const uRole = (sessionStorage.getItem('role') || 'driver').toLowerCase();
                const uMnv = sessionStorage.getItem('mnv');
                if (existing && !['manager', 'admin'].includes(uRole) && existing.mnv !== uMnv) {
                    showToast("Bạn không có quyền sửa nhật ký của người khác.", "error");
                    return;
                }
                const { error } = await _supabase.from('nhatky').update(payload).eq('id', id);
                if (error) throw error;

                if (window.parent && window.parent.logAudit) {
                    window.parent.logAudit('nhatky', id, 'UPDATE', existing, payload);
                }
            }
            else {
                const { data, error } = await _supabase.from('nhatky').insert([payload]).select();
                if (error) throw error;

                if (window.parent && window.parent.logAudit && data) {
                    window.parent.logAudit('nhatky', data[0].id, 'INSERT', null, payload);
                }
            }

            showToast("Đã lưu nhật ký vận hành thành công!", "success");
            
            // Sync dashboard
            try {
                if (window.parent && window.parent.postMessage) {
                    window.parent.postMessage('refreshStats', '*');
                }
                if (window.parent && typeof window.parent.updateHomeStats === 'function') {
                    window.parent.updateHomeStats();
                }
            } catch(e) {}

            closeModal();
            loadLogs();
        } catch (error) { 
            showToast("Lỗi lưu dữ liệu: " + error.message, "error"); 
        } finally { 
            btn.disabled = false; 
        }
        };

        function editLog(id) {
            const log = allLogs.find(l => l.id === id);
            if (log) openModal(log);
        }

        async function deleteLog(id) {
            const existing = allLogs.find(l => l.id == id);
            const uRole = (sessionStorage.getItem('role') || 'driver').toLowerCase();
            const uMnv = sessionStorage.getItem('mnv');
            if (existing && !['manager', 'admin'].includes(uRole) && existing.mnv !== uMnv) {
                showToast("Bạn không có quyền xóa nhật ký của người khác.", "error");
                return;
            }
            showConfirm("Xóa nhật ký", "Bạn có chắc chắn muốn xóa bản ghi nhật ký vận hành này không?", async (res) => {
                if (res) {
                    const { error } = await _supabase.from('nhatky').delete().eq('id', id);
                    if (error) {
                        showToast("Lỗi khi xóa: " + error.message, "error");
                    } else {
                        if (window.parent && window.parent.logAudit) {
                            window.parent.logAudit('nhatky', id, 'DELETE', existing, null);
                        }
                        showToast("Đã xóa nhật ký thành công");
                        loadLogs(true);
                    }
                }
            });
        }

        function formatDate(d) {
            if (!d) return '-';
            const date = new Date(d);
            return date.toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        window.addEventListener('message', (e) => {
            const data = e.data;
            if (data && data.type === 'confirmResponse' && data.requestId === activeConfirmId) {
                if (activeConfirmCallback) activeConfirmCallback(data.result);
                activeConfirmId = null;
                activeConfirmCallback = null;
            } else if (data && (data.type === 'dataChanged' || data.type === 'tabActivated')) {
                loadLogs(true);
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            initialize();
            // Realtime
            _supabase.channel('nhatky-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'nhatky' }, () => loadLogs(true))
                .subscribe();
        });
    </script>
