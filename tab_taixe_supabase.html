<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản lý Tài xế - Fleet Core Supabase</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #00ffcc;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header Styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
            padding: 1rem 0;
            transition: all 0.3s;
        }

        .logo-area h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-area p {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .search-box {
            position: relative;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 0.5rem 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            transition: all 0.3s;
        }

        .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
        }

        .search-box i {
            color: var(--text-dim);
            margin-right: 10px;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 250px;
            font-size: 1rem;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-add:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 15px 25px rgba(99, 102, 241, 0.3);
        }

        .btn-add:hover { transform: scale(1.05) translateY(-2px); }

        .btn-refresh {
            background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid rgba(255,255,255,0.1); 
            padding: 8px 16px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; 
            font-size: 0.85rem; display: flex; align-items: center; gap: 8px;
        }
        .btn-refresh:hover { background: rgba(255,255,255,0.1); color: white; transform: translateY(-2px); }
        .btn-refresh i { transition: transform 0.4s; }
        .btn-refresh:hover i { transform: rotate(180deg); }

        .control-btns { display: flex; gap: 10px; }

        /* Stats Row */
        /* Filter Buttons */
        .filter-bar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:1rem; }
        .filter-btn {
            padding: 6px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: var(--text-dim); cursor: pointer;
            transition: all 0.2s; font-size: 0.75rem; font-weight: 600;
            display: flex; align-items: center; gap: 6px; white-space: nowrap;
        }
        .filter-btn .btn-badge {
            background: rgba(255,255,255,0.15); padding: 1px 6px; border-radius: 6px;
            font-size: 0.8rem; font-weight: 800; min-width: 18px; text-align: center;
            color: var(--accent); box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
        }
        .filter-btn.active { background: #6366f1; color: white; border-color: #6366f1; }
        .filter-btn.active .btn-badge { background: white; color: #6366f1; }
        .filter-btn:hover { background: rgba(255,255,255,0.12); }
        
        .stats-row { display: none; }

        /* Driver Grid */
        .driver-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            padding-bottom: 5rem;
        }

        /* Filter bar */

        /* GPLX badge */
        .gplx-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 700;
            margin-top: 4px;
        }
        .gplx-ok { background: rgba(16,185,129,0.15); color: var(--success); }
        .gplx-warn { background: rgba(245,158,11,0.2); color: var(--warning); }
        .gplx-danger { background: rgba(239,68,68,0.2); color: var(--danger); }

        .driver-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            animation: slideUp 0.6s ease-out forwards;
            opacity: 0;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .driver-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .driver-header {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .driver-avatar {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
            background-size: 92% !important;
            background-repeat: no-repeat;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            flex-shrink: 0;
        }

        .driver-info-basic {
            flex: 1;
        }

        .driver-name {
            font-size: 1.25rem;
            font-weight: 800;
            color: white;
            margin-bottom: 2px;
        }

        .driver-id {
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
        }

        .driver-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .badge-active { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .badge-probation { background: rgba(245, 158, 11, 0.2); color: var(--warning); }

        .driver-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.3);
            border-radius: 16px;
        }

        .detail-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .detail-label {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .detail-value {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .driver-contact {
            display: flex;
            gap: 10px;
            margin-top: auto;
        }

        .contact-pill {
            flex: 1;
            padding: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-dim);
            text-decoration: none;
            transition: all 0.2s;
        }

        .contact-pill:hover {
            background: var(--primary);
            color: white;
        }

        .card-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* Modals */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1rem;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 32px;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            position: relative;
        }

        .modal-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 1rem;
            overflow-x: auto;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-dim);
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .modal-tab-content {
            display: none;
        }

        .modal-tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr 1fr; }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 600;
        }

        .form-group input, .form-group select, .form-group textarea {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.9rem;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: all 0.2s;
        }

        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(99,102,241,0.2); }

        .doc-check-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .check-item {
            background: rgba(15, 23, 42, 0.3);
            padding: 1rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .check-item:hover { background: rgba(15,23,42,0.5); }

        .check-item input {
            width: 20px;
            height: 20px;
            accent-color: var(--success);
        }

        .modal-actions {
            margin-top: 3rem;
            display: flex;
            justify-content: flex-end;
            gap: 1.5rem;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
        }

        .btn-cancel { background: #334155; color: white; }
        .btn-save { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; box-shadow: 0 10px 20px rgba(99,102,241,0.2); }

        .btn-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-icon:hover { background: var(--primary); color: white; transform: rotate(15deg); }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Image Preview Modal */
        #imagePreviewModal {
            z-index: 10002;
            background: rgba(15, 23, 42, 0.95);
        }

        #imagePreviewModal .modal-content {
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 95vw;
        }

        #previewImg {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 28px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.1);
            border: 8px solid rgba(255,255,255,0.05);
            image-rendering: -webkit-optimize-contrast;
            image-rendering: high-quality;
            object-fit: contain;
            filter: contrast(1.05) brightness(1.02);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #previewImg:hover { transform: scale(1.02); }

        #previewName {
            margin-top: 1.5rem;
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            letter-spacing: -0.5px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
            background: rgba(15, 23, 42, 0.6);
            padding: 8px 24px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .preview-initial-box {
            width: 300px;
            height: 300px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8rem;
            font-weight: 900;
            color: white;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .driver-avatar {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
            background-size: cover !important;
            background-repeat: no-repeat;
            background-position: center;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .driver-avatar:hover {
            transform: scale(1.1);
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }

        /* Comprehensive Mobile Responsive */
        @media (max-width: 768px) {
            body { padding: 12px; }

            header {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
                margin-bottom: 1.5rem;
                padding: 10px 0;
            }

            .logo-area {
                display: flex;
                align-items: center;
                gap: 12px;
                margin-bottom: 5px;
            }

            .logo-area .logo-icon {
                width: 45px;
                height: 45px;
                font-size: 1.5rem;
            }

            .logo-area h1 {
                font-size: 1.4rem !important;
                margin: 0;
            }

            .logo-area p { display: none; }

            .controls {
                flex-direction: column;
                gap: 10px;
            }

            .search-box { 
                width: 100%; 
                padding: 0.6rem 1rem;
            }
            
            .control-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

            /* 2 cards per row on mobile */
            .driver-grid {
                grid-template-columns: repeat(2, 1fr) !important;
                gap: 10px !important;
            }

            .driver-card {
                padding: 12px !important;
                border-radius: 20px !important;
            }

            .driver-header {
                flex-direction: column !important;
                align-items: center !important;
                text-align: center !important;
                gap: 8px !important;
            }

            .driver-avatar {
                width: 60px !important;
                height: 60px !important;
                border-radius: 18px !important;
            }

            .driver-name {
                font-size: 0.85rem !important;
                font-weight: 800 !important;
            }
            .driver-id { font-size: 0.65rem !important; }

            .driver-badge, .gplx-badge {
                font-size: 0.55rem !important;
                padding: 2px 6px !important;
            }

            .driver-details {
                display: flex !important;
                flex-direction: column !important;
                gap: 4px !important;
                padding: 8px !important;
                background: rgba(0,0,0,0.2) !important;
            }

            .detail-item {
                display: flex !important;
                justify-content: space-between !important;
                font-size: 0.65rem !important;
                border-bottom: 1px solid rgba(255,255,255,0.05);
                padding-bottom: 2px;
            }
            .detail-label { opacity: 0.6; }

            .driver-contact {
                display: grid !important;
                grid-template-columns: 1fr 1fr !important;
                gap: 5px !important;
                margin-top: 5px !important;
            }

            .contact-pill {
                padding: 6px !important;
                font-size: 0.65rem !important;
                justify-content: center !important;
            }
            
            .card-actions {
                top: 5px !important;
                right: 5px !important;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <h1><i class="fas fa-id-card"></i> TÀI XẾ</h1>
            <p>Quản lý đội ngũ tài xế chuyên nghiệp</p>
        </div>
        <div class="controls">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Tìm tên, mã NV hoặc SĐT..." oninput="filterDrivers()">
            </div>
            <div class="control-btns">
                <button class="btn-refresh" onclick="loadDrivers()">
                    <i class="fas fa-sync-alt"></i> Làm mới
                </button>
                <button class="btn-add" onclick="openModal()">
                    <i class="fas fa-user-plus"></i> THÊM TÀI XẾ
                </button>
            </div>
        </div>
    </header>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="setFilter('all', this)">
            📋 TẤT CẢ <span class="btn-badge" id="btnCountAll">0</span>
        </button>
        <button class="filter-btn" onclick="setFilter('active', this)">
            ✅ CHÍNH THỨC <span class="btn-badge" id="btnCountActive">0</span>
        </button>
        <button class="filter-btn" onclick="setFilter('probation', this)">
            ⏳ THỬ VIỆC <span class="btn-badge" id="btnCountProbation">0</span>
        </button>
        <button class="filter-btn" onclick="setFilter('manager', this)">
            👑 QUẢN LÝ <span class="btn-badge" id="btnCountManager">0</span>
        </button>
        <button class="filter-btn" onclick="setFilter('gplx_warn', this)">
            ⚠️ GPLX SẮP HẾT <span class="btn-badge" id="btnCountGplxWarn">0</span>
        </button>
    </div>

    <div class="driver-grid" id="driverGrid">
        <!-- Cards will be injected here -->
    </div>
</div>

<!-- Modal Thêm/Sửa -->
<div class="modal" id="driverModal">
    <div class="modal-content">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem;">
            <div>
                <h2 id="modalTitle" style="font-weight: 800; font-size: 2rem; margin-bottom: 5px">Thêm Tài Xế Mới</h2>
                <p style="color: var(--text-dim)">Vui lòng điền đầy đủ thông tin hồ sơ tài xế.</p>
            </div>
            <button class="btn-icon" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>

        <div class="modal-tabs">
            <button class="tab-btn active" onclick="switchTab(0)">Cá nhân</button>
            <button class="tab-btn" onclick="switchTab(1)">Công việc</button>
            <button class="tab-btn" onclick="switchTab(2)">Người thân</button>
            <button class="tab-btn" onclick="switchTab(3)">Hồ sơ</button>
        </div>

        <form id="driverForm">
            <input type="hidden" id="editId">
            
            <!-- Tab 0: Cá nhân -->
            <div class="modal-tab-content active">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Mã Nhân Viên (PK)</label>
                        <input type="text" id="ma_nv" placeholder="VD: NV001" required>
                    </div>
                    <div class="form-group">
                        <label>Họ và Tên</label>
                        <input type="text" id="ho_ten" placeholder="Nguyễn Văn A" required>
                    </div>
                    <div class="form-group">
                        <label>Số Điện Thoại</label>
                        <input type="text" id="sdt" placeholder="090...">
                    </div>
                    <div class="form-group">
                        <label>Số CCCD</label>
                        <input type="text" id="cccd">
                    </div>
                    <div class="form-group">
                        <label>Ngày Sinh</label>
                        <input type="date" id="nam_sinh">
                    </div>
                    <div class="form-group">
                        <label>Giới Tính</label>
                        <select id="gioi_tinh">
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                        </select>
                    </div>
                    <div class="form-group" style="grid-column: span 3">
                        <label>Quê Quán / Địa chỉ thường trú</label>

            <!-- Tab 2: Người thân -->
            <div class="modal-tab-content">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Họ tên người thân</label>

                    <label class="check-item"><input type="checkbox" id="hs_cccd"> Photo CCCD</label>
                    <label class="check-item"><input type="checkbox" id="hs_gplx"> Photo GPLX</label>
                    <label class="check-item"><input type="checkbox" id="hs_suc_khoe"> Giấy khám sức khỏe</label>
                    <label class="check-item"><input type="checkbox" id="hs_so_yeu"> Sơ yếu lý lịch</label>

</div>

<script>
    const SUPABASE_URL = "https://mpuqcmektepsqsazuvtb.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wdXFjbWVrdGVwc3FzYXp1dnRiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzE0NjU5OCwiZXhwIjoyMDg4NzIyNTk4fQ.eBWCfXV5v4SNSICYg_wVwaez9ycRk7-XmTry7UnHTU8";
    
    const { createClient } = supabase;
    const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let allDrivers = [];
    let USER_ROLE = sessionStorage.getItem('role') || 'driver';
    let USER_MNV = sessionStorage.getItem('mnv') || '';

    function checkAccess() {
        const isStaff = ['manager', 'admin'].includes(USER_ROLE.toLowerCase());
        if (!isStaff) {
            // Hide Add button
            document.querySelectorAll('.btn-add').forEach(el => el.style.display = 'none');
            // We'll handle edit/delete buttons in renderDrivers
        }
        return isStaff;
    }

    async function loadDrivers(isSilent = false) {
        const grid = document.getElementById('driverGrid');
        if (!isSilent) {
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 5rem;"><i class="fas fa-spinner fa-spin fa-3x" style="color: var(--primary)"></i></div>';
        }
        
        try {
            const { data, error } = await _supabase
                .from('taixe')
                .select('*')
                .order('ma_nv', { ascending: true });

            if (error) throw error;

            allDrivers = data || [];
            renderDrivers(allDrivers);
            updateStats(allDrivers);
        } catch (error) {
            if (!isSilent) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--danger)">Lỗi tải dữ liệu: ${error.message}</div>`;
            }
        }
    }

    let currentFilter = 'all';

    function daysUntil(d) {
        if (!d) return null;
        const today = new Date(); today.setHours(0,0,0,0);
        const t = new Date(d); t.setHours(0,0,0,0);
        return Math.ceil((t - today) / 86400000);
    }

    function buildGplxBadge(d) {
        const days = daysUntil(d.han_gplx);
        if (days === null) return `<span class="gplx-badge" style="background:rgba(255,255,255,0.05);color:var(--text-dim)">GPLX: Chưa điền</span>`;
        if (days < 0) return `<span class="gplx-badge gplx-danger">✗ GPLX: Hết hạn ${Math.abs(days)} ngày</span>`;
        if (days <= 60) return `<span class="gplx-badge gplx-warn">⚠ GPLX: Còn ${days} ngày</span>`;
        return `<span class="gplx-badge gplx-ok">✓ GPLX: Còn ${days} ngày</span>`;
    }

    function getAvatarColor(d) {
        const role = (d.role || 'driver').toLowerCase();
        if (role === 'manager') return 'linear-gradient(135deg, #6366f1, #a855f7)';
        if (role === 'admin') return 'linear-gradient(135deg, #ef4444, #f97316)';
        return 'linear-gradient(135deg, #1e293b, #334155)';
    }

    function renderDrivers(data) {
        const grid = document.getElementById('driverGrid');
        grid.innerHTML = '';
        // Same as desktop, responsive grid handled by CSS
        data.forEach((d, index) => {
            const card = document.createElement('div');
            card.className = 'driver-card';
            card.onclick = () => { if (window.innerWidth <= 768) editDriver(d.ma_nv); };
            card.style.animationDelay = `${index * 0.07}s`;

            const isQuit = d.trang_thai === 'Đã nghỉ việc';
            const role = (d.role || 'driver').toLowerCase();
            const isProbation = !d.chinh_thuc && !isQuit;
            
            let badgeClass = '', badgeText = '', badgeStyle = '';
            
            if (role === 'manager') {
                badgeText = '👑 Quản lý';
                badgeStyle = 'background:linear-gradient(135deg, #6366f1, #a855f7); color:white; border:none';
            } else if (role === 'admin') {
                badgeText = '🛡️ Quản trị viên';
                badgeStyle = 'background:linear-gradient(135deg, #f59e0b, #ef4444); color:white; border:none';
            } else {
                badgeText = '🚚 Tài xế';
                badgeStyle = 'background:rgba(255,255,255,0.1); color:var(--text-dim); border:1px solid rgba(255,255,255,0.1)';
            }

            // Secondary badge for status if not regular active
            let statusBadge = '';
            if (isQuit) {
                statusBadge = `<div class="driver-badge" style="top:50px; background:rgba(239,68,68,0.2); color:var(--danger)">Đã nghỉ</div>`;
            } else if (isProbation) {
                statusBadge = `<div class="driver-badge" style="top:50px; background:rgba(245,158,11,0.2); color:var(--warning)">Thử việc</div>`;
            }

            const initials = (d.ho_ten || '?').split(' ').slice(-2).map(w => w[0]).join('').toUpperCase();

            card.style.opacity = isQuit ? '0.55' : '1';

            card.innerHTML = `
                <div class="driver-badge" style="${badgeStyle}">${badgeText}</div>
                ${statusBadge}
                <div class="driver-header">
                    <div class="driver-avatar" 
                         style="${d.avatar_url ? `background-image: url('${d.avatar_url}'); background-color: #1e293b;` : `background: ${getAvatarColor(d)};`} color: white; font-weight:900; letter-spacing:-1px"
                         onclick="event.stopPropagation(); previewImage('${d.avatar_url || ''}', '${d.ho_ten || ''}', '${initials}')">
                        ${d.avatar_url ? '' : initials}
                    </div>
                    <div class="driver-info-basic">
                        <div class="driver-name">${d.ho_ten || '-'}</div>
                        <div class="driver-id">${d.ma_nv}</div>
                        ${buildGplxBadge(d)}
                    </div>
                </div>

                <div class="driver-details">
                    <div class="detail-item">
                        <span class="detail-label">Số điện thoại</span>
                        <span class="detail-value">${d.sdt || '-'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Hạng bằng</span>
                        <span class="detail-value">${d.hang_gplx || '-'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Xe phụ trách</span>
                        <span class="detail-value">${d.xe_phu_trach || 'Chưa phân công'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Ngày nhận việc</span>
                        <span class="detail-value">${d.ngay_nhan_viec || '-'}</span>
                    </div>
                    <div class="detail-item" style="grid-column: span 2">
                        <span class="detail-label">Tuyến đường</span>
                        <span class="detail-value">${d.tuyen_phu_trach || '-'}</span>
                    </div>
                </div>

                <div class="driver-contact">
                    <a href="tel:${d.sdt}" class="contact-pill" onclick="event.stopPropagation()"><i class="fas fa-phone"></i> Gọi ngay</a>
                    <a href="https://zalo.me/${d.sdt}" target="_blank" class="contact-pill" onclick="event.stopPropagation()"><i class="fas fa-comment"></i> Zalo</a>
                </div>

                ${['manager', 'admin'].includes(USER_ROLE.toLowerCase()) ? `
                <div class="card-actions">
                    <button class="btn-icon" onclick="editDriver('${d.ma_nv}')" title="Sửa"><i class="fas fa-edit"></i></button>
                    <button class="btn-icon" style="color: var(--danger)" onclick="deleteDriver('${d.ma_nv}')" title="Xóa"><i class="fas fa-trash"></i></button>
                </div>
                ` : ''}
            `;
            grid.appendChild(card);
        });
    }

    function updateStats(data) {
        let gplxWarn = 0;
        data.forEach(d => {
            const days = daysUntil(d.han_gplx);
            if (days !== null && days <= 60) gplxWarn++;
        });
        document.getElementById('btnCountAll').innerText = data.length;
        document.getElementById('btnCountActive').innerText = data.filter(d => d.chinh_thuc && d.trang_thai !== 'Đã nghỉ việc').length;
        document.getElementById('btnCountProbation').innerText = data.filter(d => !d.chinh_thuc && d.trang_thai !== 'Đã nghỉ việc').length;
        document.getElementById('btnCountManager').innerText = data.filter(d => ['manager','admin'].includes((d.role||'').toLowerCase())).length;
        document.getElementById('btnCountGplxWarn').innerText = gplxWarn;
    }

    function setFilter(type, btn) {
        currentFilter = type;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilter();
    }

    function applyFilter() {
        let filtered = [...allDrivers];
        if (currentFilter === 'active') filtered = filtered.filter(d => d.chinh_thuc && d.trang_thai !== 'Đã nghỉ việc');
        else if (currentFilter === 'probation') filtered = filtered.filter(d => !d.chinh_thuc && d.trang_thai !== 'Đã nghỉ việc');
        else if (currentFilter === 'manager') filtered = filtered.filter(d => ['manager','admin'].includes((d.role||'').toLowerCase()));
        else if (currentFilter === 'gplx_warn') filtered = filtered.filter(d => { const n = daysUntil(d.han_gplx); return n !== null && n <= 60; });
        else if (currentFilter === 'nghi') filtered = filtered.filter(d => d.trang_thai === 'Đã nghỉ việc');
        const q = document.getElementById('searchInput').value.toLowerCase();
        if (q) filtered = filtered.filter(d => (d.ho_ten||'').toLowerCase().includes(q) || (d.ma_nv||'').toLowerCase().includes(q) || (d.sdt||'').includes(q));
        renderDrivers(filtered);
    }

    function filterDrivers() { applyFilter(); }

    function switchTab(index) {
        document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === index));
        document.querySelectorAll('.modal-tab-content').forEach((c, i) => c.classList.toggle('active', i === index));
    }

    function openModal(editData = null) {
        const modal = document.getElementById('driverModal');
        const form = document.getElementById('driverForm');
        form.reset();
        switchTab(0);
        
        const fields = [
            'ma_nv', 'ho_ten', 'nam_sinh', 'gioi_tinh', 'cccd', 'sdt', 'que_quan',
            'hang_gplx', 'so_gplx', 'han_gplx', 'ngay_trung_tuyen', 'noi_cap', 
            'ngay_nhan_viec', 'thu_viec', 'chinh_thuc', 'trang_thai', 'ngay_nghi_viec',
            'xe_phu_trach', 'tuyen_phu_trach', 'role', 'ca_lam_viec', 'bl_ho_ten', 'bl_quan_he',
            'bl_sdt', 'bl_que_quan', 'ghi_chu'
        ];
        
        const checks = ['hs_cccd', 'hs_gplx', 'hs_suc_khoe', 'hs_so_yeu', 'hs_cu_tru', 'hs_dan_su'];

        if (editData) {
            document.getElementById('modalTitle').innerText = "Cập nhật tài xế " + editData.ma_nv;
            document.getElementById('editId').value = editData.ma_nv;
            document.getElementById('ma_nv').disabled = true;
            
            fields.forEach(f => {
                const el = document.getElementById(f);
                if (el) el.value = editData[f] || '';
            });
            
            checks.forEach(c => {
                const el = document.getElementById(c);
                if (el) el.checked = editData[c] === true;
            });
        } else {
            document.getElementById('modalTitle').innerText = "Thêm Tài Xế Mới";
            document.getElementById('editId').value = '';
            document.getElementById('ma_nv').disabled = false;
        }
        
        toggleNgayNghi();

        modal.classList.add('active');
        
        // Restriction: Only manager can setup system roles
        const roleSelect = document.getElementById('role');
        if (roleSelect) {
            roleSelect.disabled = (USER_ROLE.toLowerCase() !== 'manager');
        }
    }

    function closeModal() {
        document.getElementById('driverModal').classList.remove('active');
    }

    function showToast(msg, theme = 'success') {
        if (window.parent && window.parent.postMessage) {
            window.parent.postMessage({ type: 'toast', message: msg, theme: theme }, '*');
        } else {
            console.log("Toast:", msg);
        }
    }

    let activeConfirmId = null;
    let activeConfirmCallback = null;
    function showConfirm(title, message, callback) {
        if (window.parent && window.parent.postMessage) {
            activeConfirmId = Date.now();
            activeConfirmCallback = callback;
            window.parent.postMessage({ 
                type: 'confirmRequest', 
                title: title, 
                message: message, 
                requestId: activeConfirmId 
            }, '*');
        } else {
            if (confirm(message)) callback(true);
            else callback(false);
        }
    }

    document.getElementById('driverForm').onsubmit = async (e) => {
        e.preventDefault();
        if (!['manager', 'admin'].includes(USER_ROLE.toLowerCase())) {
            showToast("Bạn không có quyền thực hiện thao tác này.", "error");
            return;
        }
        const btn = document.getElementById('saveBtn');
        const originalText = btn.innerText;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang lưu...';
        btn.disabled = true;

        const editId = document.getElementById('editId').value;
        const fields = [
            'ma_nv', 'ho_ten', 'nam_sinh', 'gioi_tinh', 'cccd', 'sdt', 'que_quan',
            'hang_gplx', 'so_gplx', 'han_gplx', 'ngay_trung_tuyen', 'noi_cap', 
            'ngay_nhan_viec', 'thu_viec', 'chinh_thuc', 'trang_thai', 'ngay_nghi_viec',
            'xe_phu_trach', 'tuyen_phu_trach', 'role', 'ca_lam_viec', 'bl_ho_ten', 'bl_quan_he',
            'bl_sdt', 'bl_que_quan', 'ghi_chu'
        ];
        const checks = ['hs_cccd', 'hs_gplx', 'hs_suc_khoe', 'hs_so_yeu', 'hs_cu_tru', 'hs_dan_su'];

        const payload = { updated_at: new Date().toISOString() };
        fields.forEach(f => {
            const el = document.getElementById(f);
            if (el) {
                payload[f] = el.value.trim() === '' ? null : el.value.trim();
            }
        });
        checks.forEach(c => {
            const el = document.getElementById(c);
            if (el) payload[c] = el.checked;
        });

        try {
            let result;
            if (editId) {
                result = await _supabase.from('taixe').update(payload).eq('ma_nv', editId);
            } else {
                result = await _supabase.from('taixe').insert([payload]);
            }

            if (result.error) throw result.error;
            showToast("Lưu thông tin tài xế thành công!", "success");
            closeModal();
            loadDrivers();
        } catch (error) {
            showToast("Lỗi: " + error.message, "error");
        } finally {
            btn.innerText = originalText;
            btn.disabled = false;
        }
    };

    function editDriver(ma) {
        const d = allDrivers.find(item => item.ma_nv === ma);
        if (d) openModal(d);
    }

    async function deleteDriver(ma) {
        if (!['manager', 'admin'].includes(USER_ROLE.toLowerCase())) {
            showToast("Bạn không có quyền thực hiện thao tác này.", "error");
            return;
        }
        showConfirm("Xóa tài xế", `Bạn có chắc muốn xóa tài xế ${ma} khỏi danh sách không?`, async (res) => {
            if (res) {
                try {
                    const { error } = await _supabase.from('taixe').delete().eq('ma_nv', ma);
                    if (error) throw error;
                    showToast("Xóa tài xế thành công!", "success");
                    loadDrivers();
                } catch (error) {
                    showToast("Lỗi khi xóa: " + error.message, "error");
                }
            }
        });
    }

    function toggleNgayNghi() {
        const tt = document.getElementById('trang_thai').value;
        const group = document.getElementById('group_ngay_nghi');
        group.style.display = (tt === 'Đã nghỉ việc' || tt === 'Tạm hoãn') ? 'flex' : 'none';
    }

    function calcChinhThuc() {
        const ngayNhan = document.getElementById('ngay_nhan_viec').value;
        const monthStr = document.getElementById('thu_viec').value;
        if (!ngayNhan || monthStr === "") return;
        
        const months = parseInt(monthStr);
        const d = new Date(ngayNhan);
        d.setMonth(d.getMonth() + months);
        document.getElementById('chinh_thuc').value = d.toISOString().split('T')[0];
    }

    window.addEventListener('scroll', () => {
        const header = document.querySelector('header');
        if (window.scrollY > 50) {
            header.style.background = 'rgba(15, 23, 42, 0.8)';
            header.style.padding = '1rem 2rem';
            header.style.backdropFilter = 'blur(10px)';
            header.style.position = 'sticky';
            header.style.top = '0';
            header.style.zIndex = '100';
            header.style.borderRadius = '0 0 20px 20px';
        } else {
            header.style.background = 'transparent';
        }
    });

    window.addEventListener('message', (e) => {
        const data = e.data;
        if (data && data.type === 'confirmResponse' && data.requestId === activeConfirmId) {
            if (activeConfirmCallback) activeConfirmCallback(data.result);
            activeConfirmId = null;
            activeConfirmCallback = null;
        } else if (data && data.type === 'dataChanged' && (data.table === 'taixe' || !data.table)) {
            loadDrivers(true);
        }
    });

    async function initRealtime() {
        await loadDrivers();
        _supabase.channel('driver-sync')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'taixe' }, () => loadDrivers(true))
            .subscribe();
    }

    async function loadVehicleOptions() {
        try {
            const { data } = await _supabase.from('xe').select('bien_so_xe');
            const list = document.getElementById('vehicleList');
            if (data && list) {
                list.innerHTML = data.map(v => `<option value="${v.bien_so_xe}">`).join('');
            }
        } catch (e) { console.error("Error loading vehicles:", e); }
    }
</script>

<!-- Modal Xem Ảnh -->
<div class="modal" id="imagePreviewModal" onclick="closePreview()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="previewInitial" class="preview-initial-box" style="display: none;"></div>
        <img id="previewImg" src="" alt="Avatar" style="display: none;">
        <div id="previewName"></div>
        <div style="margin-top: 2rem; display: flex; gap: 10px;">
            <button class="btn" style="background: rgba(255,255,255,0.1); color: white;" onclick="closePreview()">Đóng cửa sổ</button>
        </div>
    </div>
</div>

<script>
    function previewImage(url, name, initials) {
        const modal = document.getElementById('imagePreviewModal');
        const img = document.getElementById('previewImg');
        const initialBox = document.getElementById('previewInitial');
        const title = document.getElementById('previewName');
        
        title.innerText = name;
        
        if (url && url !== 'null') {
            img.src = url;
            img.style.display = 'block';
            initialBox.style.display = 'none';
        } else {
            img.style.display = 'none';
            initialBox.style.display = 'flex';
            initialBox.innerText = initials;
            initialBox.style.background = 'linear-gradient(135deg, var(--primary), var(--secondary))';
        }
        
        modal.classList.add('active');
    }

    function closePreview() {
        document.getElementById('imagePreviewModal').classList.remove('active');
    }

    document.addEventListener('DOMContentLoaded', () => {
        if (typeof checkAccess === 'function') checkAccess();
        
        // Hide Add Button for non-admin roles (Tài xế/Hồ sơ chỉ được xem)
        if (!['manager', 'admin'].includes((USER_ROLE || '').toLowerCase())) {
            const btnAdd = document.querySelector('.btn-add');
            if (btnAdd) btnAdd.style.display = 'none';
        }

        loadDrivers();
        loadVehicleOptions();
        
        // Realtime Subscription
        if (typeof _supabase !== 'undefined') {
            _supabase.channel('taixe-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'taixe' }, () => loadDrivers(true))
                .subscribe();
        }
    });

    function checkAccess() {
        if (typeof USER_ROLE === 'undefined' || !USER_ROLE) {
            window.location.href = 'index.html';
        }
    }
</script>

</body>
</html>
