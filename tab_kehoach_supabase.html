<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kế hoạch Bảo dưỡng - Fleet Core Supabase</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #00f2fe;
            --secondary-color: #4facfe;
            --accent-color: #f093fb;
            --warning-color: #f6d365;
            --danger-color: #ff0844;
            --success-color: #66e0a3;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: #0f172a;
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 58, 138, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.3) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(15, 23, 42, 1) 0px, transparent 50%);
            background-attachment: fixed;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* --- Glassmorphism Elements --- */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }
          /* Filter Buttons */
        /* Filter Buttons */
        .filter-bar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:1rem; }
        .filter-btn {
            padding: 6px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: var(--text-dim); cursor: pointer;
            transition: all 0.2s; font-size: 0.75rem; font-weight: 600;
            display: flex; align-items: center; gap: 6px; white-space: nowrap;
        }
        .filter-btn .btn-badge {
            background: rgba(255,255,255,0.15); padding: 1px 6px; border-radius: 6px;
            font-size: 0.8rem; font-weight: 800; min-width: 18px; text-align: center;
            color: var(--accent); box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
        }
        .filter-btn.active { background: #6366f1; color: white; border-color: #6366f1; }
        .filter-btn.active .btn-badge { background: white; color: #6366f1; }
        .filter-btn:hover { background: rgba(255,255,255,0.12); }

        .btn-refresh {
            background: rgba(255,255,255,0.05); color: var(--text-dim); border: 1px solid rgba(255,255,255,0.1); 
            padding: 8px 16px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.3s; 
            font-size: 0.85rem; display: flex; align-items: center; gap: 8px; font-family:'Outfit',sans-serif;
        }
        .btn-refresh:hover { background: rgba(255,255,255,0.1); color: white; transform: translateY(-2px); }
        .btn-refresh i { transition: transform 0.4s; }
        .btn-refresh:hover i { transform: rotate(180deg); }

        .control-btns { display: flex; gap: 10px; }

        .stats-row { display: none; } /* Hide old stats cards */
        
        .my-vehicle-row {
            background: rgba(0, 242, 254, 0.05) !important;
        }
        .my-vehicle-row td {
            border-color: rgba(0, 242, 254, 0.3) !important;
        }
        .my-vehicle-badge {
            display: inline-block;
            background: var(--primary-color);
            color: #000;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
            vertical-align: middle;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary-color);
        }

        .stat-card.warning::before { background: var(--warning-color); }
        .stat-card.danger::before { background: var(--danger-color); }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .stat-info h3 {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-info p {
            font-size: 1.8rem;
            font-weight: 700;
        }

        /* --- Table Styling --- */
        .table-container {
            overflow-x: auto;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            text-align: center;
            font-weight: 600;
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
            white-space: nowrap;
            font-size: 0.75rem;
        }

        td {
            padding: 12px 15px;
            text-align: center;
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        .bg-L2 { background: rgba(139, 92, 246, 0.1); }
        .bg-plan { background: rgba(246, 211, 101, 0.05); }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-danger { background: rgba(255, 8, 68, 0.2); color: #ff0844; }
        .badge-warning { background: rgba(246, 211, 101, 0.2); color: #f6d365; }
        .badge-success { background: rgba(102, 224, 163, 0.2); color: #66e0a3; }

        .text-bold { font-weight: 700; }
        .text-accent { color: var(--primary-color); }

        /* --- Controls --- */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-input {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 12px 20px;
            border-radius: 12px;
            color: #fff;
            width: 300px;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(0, 242, 254, 0.2);
        }

        .btn {
            background: var(--primary-color);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: #fff;
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* --- Loading Spinner --- */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) {
            .stats-row { grid-template-columns: 1fr 1fr; }
        }

        /* Mobile Card Layout */
        .plan-card-list { display: none; flex-direction: column; gap: 10px; }
        .plan-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: all 0.2s;
        }
        .plan-card.my-vehicle-row { background: rgba(0, 242, 254, 0.05); border-color: rgba(0, 242, 254, 0.3); }
        .plan-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .plan-card-bsx {
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .plan-card-status { display: flex; gap: 6px; }
        .plan-card-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 12px;
        }
        .plan-card-item { display: flex; flex-direction: column; gap: 1px; }
        .plan-card-label { font-size: 0.55rem; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: 0.5px; }
        .plan-card-value { font-size: 0.78rem; font-weight: 600; color: var(--text-primary); }
        .plan-card-divider {
            border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 2px 0;
        }
        .plan-card-bottom {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }
        .plan-card-alert {
            display: flex;
            align-items: center;
            gap: 5px;
            border-radius: 8px;
            padding: 5px 8px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .plan-card-alert.badge-danger  { background: rgba(255,8,68,0.15);   color: #ff0844; }
        .plan-card-alert.badge-warning { background: rgba(246,211,101,0.15); color: #f6d365; }
        .plan-card-alert.badge-success { background: rgba(102,224,163,0.15); color: #66e0a3; }

        /* Mobile Controls: compact 2-column grid */
        @media (max-width: 768px) {
            .stats-row { 
                grid-template-columns: repeat(3, 1fr); 
                gap: 8px;
                margin-bottom: 12px;
            }
            .stat-card {
                padding: 8px;
                border-radius: 12px;
                gap: 8px;
            }
            .stat-icon {
                width: 28px;
                height: 28px;
                font-size: 1rem;
            }
            .stat-info h3 { font-size: 0.58rem; letter-spacing: 0; }
            .stat-info p { font-size: 1.1rem; }

            .header { flex-direction: column; gap: 1rem; align-items: stretch; }
            .header h1 { display: none; }
            .controls {
                flex-direction: column;
                width: 100%;
                gap: 10px;
            }
            .search-input { width: 100%; max-width: none; }
            .control-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
            .btn-refresh, .btn { width: 100% !important; justify-content: center; margin: 0; }

            .controls label {
                display: flex;
                align-items: center;
                gap: 6px;
                font-size: 0.82rem !important;
                background: var(--glass-bg);
                border: 1px solid var(--glass-border);
                border-radius: 10px;
                padding: 8px 12px;
                cursor: pointer;
            }

            .glass-panel { padding: 10px; }

            /* Switch desktop table → mobile cards */
            .table-container { display: none; }
            .plan-card-list { display: flex; }

            .plan-card-value { font-size: 0.75rem; }

            .modal-content { padding: 1.5rem !important; width: 95% !important; max-width: 100% !important; border-radius: 20px !important; }
            .modal-content h2 { font-size: 1.5rem !important; }
            .form-grid { grid-template-columns: 1fr !important; gap: 10px !important; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1 id="title_main"><i class="fas fa-calendar-check"></i> KẾ HOẠCH BĐ</h1>
            <div class="controls">
                <input type="text" class="search-input" id="searchInput" placeholder="Tìm biển số xe..." onkeyup="filterTable()">
                <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:0.9rem; color:var(--text-secondary); user-select:none;">
                    <input type="checkbox" id="chkOnlyMyVehicle" onchange="filterTable()" style="width:18px;height:18px;cursor:pointer;"> <b>Xe của tôi</b>
                </label>
                <div class="control-btns">
                    <button class="btn-refresh" onclick="loadMaintenancePlan()">
                        <i class="fas fa-sync-alt"></i> Làm mới
                    </button>
                    <button class="btn" onclick="exportToExcel()">
                        <i class="fas fa-file-excel"></i> Xuất Excel
                    </button>
                </div>
            </div>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterByStatus('all', this)">
                <i class="fas fa-truck"></i> TẤT CẢ <span class="btn-badge" id="btnCountAll">0</span>
            </button>
            <button class="filter-btn" onclick="filterByStatus('overdue', this)">
                <i class="fas fa-exclamation-triangle"></i> QUÁ HẠN <span class="btn-badge" id="btnCountOverdue">0</span>
            </button>
            <button class="filter-btn" onclick="filterByStatus('upcoming', this)">
                <i class="fas fa-clock"></i> SẮP ĐẾN HẠN <span class="btn-badge" id="btnCountUpcoming">0</span>
            </button>
        </div>

        <div class="glass-panel">
            <!-- Desktop Table -->
            <div class="table-container">
                <table id="planTable">
                    <thead>
                        <tr>
                            <th rowspan="3">STT</th>
                            <th rowspan="3">Biển Số Xe</th>
                            <th rowspan="3">Loại Xe</th>
                            <th rowspan="3">Tải Trọng</th>
                            <th rowspan="3">KM TB/Ngày</th>
                            <th colspan="6">Kế Hoạch Bảo Dưỡng Định Kỳ</th>
                            <th rowspan="3">KM Còn Lại</th>
                            <th rowspan="3">Ngày Còn Lại</th>
                        </tr>
                        <tr>
                            <th colspan="2" class="bg-L2">Kỳ Trước (L2)</th>
                            <th colspan="4" class="bg-plan">Kế Hoạch Kỳ Này (L1)</th>
                        </tr>
                        <tr>
                            <th class="bg-L2">KM T.H</th>
                            <th class="bg-L2">Ngày T.H</th>
                            <th class="bg-plan">KM T.H</th>
                            <th class="bg-plan">Ngày T.H</th>
                            <th class="bg-plan">KM KH</th>
                            <th class="bg-plan">Ngày KH</th>
                        </tr>
                    </thead>
                    <tbody id="planBody">
                        <tr>
                            <td colspan="13" style="padding: 40px;">Đang tải dữ liệu và tính toán kế hoạch...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Mobile Card List -->
            <div class="plan-card-list" id="planCardList">
                <div style="text-align:center; padding:2rem; color:rgba(255,255,255,0.4);"><i class="fas fa-spinner fa-spin"></i></div>
            </div>
        </div>
    </div>

    <!-- SheetJS for Excel Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = "https://mpuqcmektepsqsazuvtb.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1wdXFjbWVrdGVwc3FzYXp1dnRiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MzE0NjU5OCwiZXhwIjoyMDg4NzIyNTk4fQ.eBWCfXV5v4SNSICYg_wVwaez9ycRk7-XmTry7UnHTU8";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allPlanData = [];

        async function loadMaintenancePlan(isSilent = false) {
            if (!isSilent) showLoading(true);
            try {
                // 1. Fetch necessary data
                // Fetch all vehicles, all recent logs (to calc avg km), and all maintenance records
                const [{ data: xeList }, { data: baoduongList }, { data: nhatkyList }] = await Promise.all([
                    _supabase.from('xe').select('bien_so_xe, loai_xe, tai_trong'),
                    _supabase.from('baoduong').select('*').eq('loai_hinh', 'Bảo dưỡng').order('ngay_ket_thuc', { ascending: false }),
                    _supabase.from('nhatky').select('bien_so_xe, tong_km, ngay_van_hanh, km_ve').order('ngay_van_hanh', { ascending: false })
                ]);

                if (!xeList) throw new Error("Could not fetch vehicle list");

                // 2. Process data for each vehicle
                allPlanData = xeList.map((xe, index) => {
                    const bsx = xe.bien_so_xe;
                    
                    // Get maintenance records for this car
                    const vMaintenance = (baoduongList || []).filter(b => b.bien_so_xe === bsx);
                    const L1 = vMaintenance[0] || {}; // Latest
                    const L2 = vMaintenance[1] || {}; // Second latest

                    // Calculate average KM per day (last 30 days)
                    const vLogs = (nhatkyList || []).filter(n => n.bien_so_xe === bsx);
                    const thirtyDaysAgo = new Date();
                    thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
                    
                    const recentLogs = vLogs.filter(n => {
                        const logDate = new Date(n.ngay_van_hanh);
                        return !isNaN(logDate) && logDate >= thirtyDaysAgo;
                    });
                    
                    const totalKmLast30 = recentLogs.reduce((sum, log) => sum + (Number(log.tong_km) || 0), 0);
                    const avgKmDay = totalKmLast30 / 30 || 0;

                    // Get current ODO
                    const currentOdo = Number(vLogs[0]?.km_ve) || Number(L1.km_sau) || 0;

                    // Standard calculation: Interval is 5000km
                    const kmInterval = 5000;
                    const kmPlan = L1.km_sau ? (Number(L1.km_sau) + kmInterval) : kmInterval;
                    
                    const kmRemain = kmPlan - currentOdo;
                    const daysRemain = avgKmDay > 0 ? Math.floor(kmRemain / avgKmDay) : null;
                    
                    let datePlan = "—";
                    if (daysRemain !== null && isFinite(daysRemain)) {
                        const d = new Date();
                        d.setDate(d.getDate() + daysRemain);
                        datePlan = d.toLocaleDateString('vi-VN');
                    }

                    return {
                        stt: index + 1,
                        bsx: bsx,
                        loaiXe: xe.loai_xe || "—",
                        taiTrong: xe.tai_trong || "—",
                        avgKmDay: avgKmDay.toFixed(1),
                        kmL2: L2.km_sau || "—",
                        ngayL2: formatDate(L2.ngay_ket_thuc),
                        kmL1: L1.km_sau || "—",
                        ngayL1: formatDate(L1.ngay_ket_thuc),
                        kmPlan: kmPlan,
                        datePlan: datePlan,
                        kmRemain: kmRemain,
                        daysRemain: daysRemain
                    };
                });

                renderTable(allPlanData);
                updateStats(allPlanData);

            } catch (error) {
                console.error("Error loading plan:", error);
                if (!isSilent) document.getElementById('planBody').innerHTML = `<tr><td colspan="13" style="color:red; padding: 40px;">Lỗi: ${error.message}</td></tr>`;
            } finally {
                if (!isSilent) showLoading(false);
            }
        }

        function getStatusClass(kmRemain, daysRemain) {
            if (kmRemain < 0 || (daysRemain !== null && isFinite(daysRemain) && daysRemain < 0)) return 'badge-danger';
            if (kmRemain < 500 || (daysRemain !== null && isFinite(daysRemain) && daysRemain < 7)) return 'badge-warning';
            return 'badge-success';
        }

        function renderTable(data) {
            const tbody = document.getElementById('planBody');
            const cardList = document.getElementById('planCardList');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="13" style="padding: 40px;">Không có dữ liệu phù hợp.</td></tr>`;
                cardList.innerHTML = `<div style="text-align:center;padding:2rem;color:rgba(255,255,255,0.4);">Không có dữ liệu.</div>`;
                return;
            }

            const myVehicle = sessionStorage.getItem('xe_phu_trach');

            // ---- Desktop Table ----
            tbody.innerHTML = data.map(item => {
                let kmClass = "";
                let dayClass = "";
                if (item.kmRemain < 0) kmClass = "badge-danger";
                else if (item.kmRemain < 500) kmClass = "badge-warning";
                else kmClass = "badge-success";
                if (item.daysRemain !== null && isFinite(item.daysRemain)) {
                    if (item.daysRemain < 0) dayClass = "badge-danger";
                    else if (item.daysRemain < 7) dayClass = "badge-warning";
                    else dayClass = "badge-success";
                }
                const isMyVehicle = (myVehicle && myVehicle === item.bsx);
                const bsxHtml = isMyVehicle ? `${item.bsx} <span class="my-vehicle-badge">CỦA TÔI</span>` : item.bsx;
                return `
                    <tr class="${isMyVehicle ? 'my-vehicle-row' : ''}">
                        <td>${item.stt}</td>
                        <td class="text-bold">${bsxHtml}</td>
                        <td>${item.loaiXe}</td>
                        <td>${item.taiTrong}</td>
                        <td class="text-accent">${item.avgKmDay}</td>
                        <td class="bg-L2">${formatNum(item.kmL2)}</td>
                        <td class="bg-L2">${item.ngayL2}</td>
                        <td class="bg-plan">${formatNum(item.kmL1)}</td>
                        <td class="bg-plan">${item.ngayL1}</td>
                        <td class="bg-plan text-bold text-accent">${formatNum(item.kmPlan)}</td>
                        <td class="bg-plan text-bold">${item.datePlan}</td>
                        <td><span class="badge ${kmClass}">${formatNum(item.kmRemain)} km</span></td>
                        <td><span class="badge ${dayClass}">${(item.daysRemain !== null && isFinite(item.daysRemain)) ? item.daysRemain + ' ngày' : '—'}</span></td>
                    </tr>
                `;
            }).join('');

            // ---- Mobile Cards ----
            cardList.innerHTML = data.map((item, idx) => {
                const isMyVehicle = (myVehicle && myVehicle === item.bsx);
                const statusCls = getStatusClass(item.kmRemain, item.daysRemain);
                const kmIcon = item.kmRemain < 0 ? '❌' : item.kmRemain < 500 ? '⚠️' : '✅';
                const dayTxt = (item.daysRemain !== null && isFinite(item.daysRemain)) ? item.daysRemain + ' ngày' : '—';
                const bsxBadge = isMyVehicle ? `<span class="my-vehicle-badge">CỦA TÔI</span>` : '';
                return `
                <div class="plan-card ${isMyVehicle ? 'my-vehicle-row' : ''}">
                    <div class="plan-card-header">
                        <div class="plan-card-bsx">${item.bsx} ${bsxBadge}</div>
                        <span style="font-size:0.65rem;color:rgba(255,255,255,0.4);">${item.loaiXe} &middot; ${item.taiTrong}T &middot; ${item.avgKmDay}km/ng</span>
                    </div>
                    <hr class="plan-card-divider">
                    <div class="plan-card-bottom">
                        <div class="plan-card-alert ${statusCls}">
                            ${kmIcon} <span>KM còn: <b>${formatNum(item.kmRemain)}</b></span>
                        </div>
                        <div class="plan-card-alert ${statusCls}">
                            🕐 <span>Còn: <b>${dayTxt}</b></span>
                        </div>
                    </div>
                    <div class="plan-card-body">
                        <div class="plan-card-item">
                            <span class="plan-card-label">KM TB/ngày</span>
                            <span class="plan-card-value" style="color:var(--primary-color)">${item.avgKmDay} km</span>
                        </div>
                        <div class="plan-card-item">
                            <span class="plan-card-label">Ngày BD kế hoạch</span>
                            <span class="plan-card-value">${item.datePlan}</span>
                        </div>
                        <div class="plan-card-item">
                            <span class="plan-card-label">KM kỳ trước (L2)</span>
                            <span class="plan-card-value" style="color:rgba(139,92,246,0.9)">${formatNum(item.kmL2)}</span>
                        </div>
                        <div class="plan-card-item">
                            <span class="plan-card-label">Ngày BD kỳ trước</span>
                            <span class="plan-card-value">${item.ngayL2}</span>
                        </div>
                        <div class="plan-card-item">
                            <span class="plan-card-label">KM lần BD gần nhất</span>
                            <span class="plan-card-value" style="color:rgba(246,211,101,0.9)">${formatNum(item.kmL1)}</span>
                        </div>
                        <div class="plan-card-item">
                            <span class="plan-card-label">KM KH lần tới</span>
                            <span class="plan-card-value" style="color:var(--primary-color);font-weight:800">${formatNum(item.kmPlan)}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function updateStats(data) {
            const total = data.length;
            const overdue = data.filter(i => i.kmRemain < 0).length;
            const upcoming = data.filter(i => i.kmRemain >= 0 && i.kmRemain < 500).length;
            
            document.getElementById('btnCountAll').textContent = total;
            document.getElementById('btnCountOverdue').textContent = overdue;
            document.getElementById('btnCountUpcoming').textContent = upcoming;
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const showOnlyMyVehicle = document.getElementById('chkOnlyMyVehicle').checked;
            const myVehicle = sessionStorage.getItem('xe_phu_trach');

            let filtered = allPlanData;
            
            if (showOnlyMyVehicle && myVehicle) {
                filtered = filtered.filter(i => i.bsx === myVehicle);
            }

            if (query) {
                filtered = filtered.filter(i => i.bsx.toLowerCase().includes(query));
            }
            renderTable(filtered);
        }

        function filterByStatus(status, btn) {
            if (btn) {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            let filtered = allPlanData;
            if (status === 'overdue') {
                filtered = allPlanData.filter(i => i.kmRemain < 0);
            } else if (status === 'upcoming') {
                filtered = allPlanData.filter(i => i.kmRemain >= 0 && i.kmRemain < 500);
            }
            renderTable(filtered);
        }

        function formatDate(d) {
            if (!d) return "—";
            const date = new Date(d);
            if (isNaN(date.getTime())) return "—";
            return date.toLocaleDateString('vi-VN');
        }

        function formatNum(n) {
            if (n === null || n === undefined || isNaN(n) || n === "—") return n;
            return Math.round(Number(n)).toLocaleString('vi-VN');
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        function exportToExcel() {
            const table = document.getElementById('planTable');
            const wb = XLSX.utils.table_to_book(table, { sheet: "KeHoachBaoDuong" });
            XLSX.writeFile(wb, "Ke_Hoach_Bao_Duong_" + new Date().toISOString().split('T')[0] + ".xlsx");
        }

        window.addEventListener('message', (e) => {
            if (e.data && e.data.type === 'dataChanged' && (e.data.table === 'baoduong' || e.data.table === 'nhatky' || !e.data.table)) {
                loadMaintenancePlan(true);
            }
        });

        async function initRealtime() {
            await loadMaintenancePlan();
            // Refresh plan if maintenance records or logs change
            _supabase.channel('plan-sync')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'baoduong' }, () => loadMaintenancePlan(true))
                .on('postgres_changes', { event: '*', schema: 'public', table: 'nhatky' }, () => loadMaintenancePlan(true))
                .subscribe();
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', initRealtime);
    </script>
</body>
</html>
