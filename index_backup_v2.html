<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>QUẢN LÝ PHƯƠNG TIỆN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body {
            background-color: #f4f6f8;
            min-height: 100vh;
            margin: 0;
            /* Animation setup */
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center center;
            transition: background 0.5s ease;
            overflow-x: hidden;
            /* NGĂN TRÀN NGANG TOÀN TRANG */
        }

        html {
            overflow-x: hidden;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        /* === END LEGACY BACKGROUND ANIMATIONS === */
        .hidden {
            display: none;
        }

        .card-hover {
            transition: 0.2s;
        }

        .card-hover:hover {
            cursor: pointer;
            transform: scale(1.03);
        }

        .form-box,
        .box,
        .card,
        .login-box,
        .report-card {
            background: transparent !important;
            box-shadow: none !important;
            border-radius: 12px;
            margin-bottom: 20px;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
            border: none !important;
        }

        /* Hiệu ứng kính mờ dành cho Tab Báo cáo & Bảng kê nhiên liệu */
        #baocao .box,
        #fuelgrid .box {
            background: rgba(255, 255, 255, 0.15) !important;
            backdrop-filter: blur(15px) !important;
            -webkit-backdrop-filter: blur(15px) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3) !important;
            padding: 1rem !important;
            /* Compact padding */
        }

        /* Các thẻ con bên trong box không dùng hiệu ứng kính để tránh đè lớp */
        #baocao .report-card {
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 15px;
            margin-bottom: 12px;
            padding: 15px !important;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3) !important;
            border-left-width: 6px !important;
        }

        #baocao .report-card .subtitle {
            color: rgba(255, 255, 255, 0.9) !important;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8) !important;
            font-size: 0.75rem !important;
            font-weight: 700 !important;
            margin-bottom: 8px !important;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #baocao .report-card .report-number {
            font-size: 1.8rem !important;
            font-weight: 900 !important;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5) !important;
        }

        .h-100 {
            height: 100% !important;
        }

        /* Bảng giữ nguyên nền trắng mờ để dễ đọc */
        .table-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* Duplicated table style removed */
        /* Chữ có viền bóng để nổi trên nền ảnh */
        .label,
        .title,
        .subtitle,
        .checkbox,
        .radio {
            color: #fff !important;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8), 0 0 2px rgba(0, 0, 0, 0.5);
        }

        /* ================= APP LAUNCHER STYLE (HOME) ================= */
        #home .app-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            padding: 15px 5px;
            width: 100%;
        }

        .app-card {
            background: rgba(255, 255, 255, 0.03) !important;
            backdrop-filter: blur(15px) !important;
            -webkit-backdrop-filter: blur(15px) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 20px !important;
            padding: 18px 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .app-card:hover {
            background: rgba(255, 255, 255, 0.08) !important;
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.2) !important;
        }

        .app-card:active {
            transform: scale(0.95);
        }

        .app-icon {
            font-size: 3rem;
            margin-bottom: 8px;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.3));
            transition: transform 0.3s ease;
        }

        .app-card:hover .app-icon {
            transform: scale(1.1);
        }

        .app-name {
            color: #ffffff;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
            line-height: 1.2;
        }

        @media (max-width: 480px) {
            .app-card {
                padding: 12px 18px;
                border-radius: 16px !important;
            }

            .app-icon {
                font-size: 2.2rem;
                margin-bottom: 6px;
            }

            .app-name {
                font-size: 0.75rem;
            }
        }

        .form-box {
            width: 100%;
            max-width: 98% !important;
            margin: auto;
            padding: 15px;
        }

        .notification-badge {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #ff3b30;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 50%;
            min-width: 20px;
            height: 20px;
            padding: 0 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            border: 2px solid white;
            z-index: 10;
        }

        /* ================= BÁO CÁO (REPORT) STYLES ================= */
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            padding: 0 15px;
        }

        body {
            font-family: 'Outfit', sans-serif !important;
        }

        .stat-card {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .stat-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.05));
            pointer-events: none;
        }

        .stat-card::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 3px;
            border-radius: 10px;
            opacity: 0.6;
        }

        .stat-card.is-cyan::after {
            background: #00f2fe;
            box-shadow: 0 0 15px #00f2fe;
        }

        .stat-card.is-yellow::after {
            background: #f9d423;
            box-shadow: 0 0 15px #f9d423;
        }

        .stat-card.is-red::after {
            background: #ff5858;
            box-shadow: 0 0 15px #ff5858;
        }

        .stat-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        .stat-card .watermark {
            position: absolute;
            right: -10px;
            bottom: -10px;
            font-size: 5rem;
            opacity: 0.05;
            transform: rotate(-15deg);
            pointer-events: none;
        }

        .stat-card .stat-icon {
            font-size: 1.2rem;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 0;
            line-height: 1.2;
            letter-spacing: -1px;
        }

        .stat-label {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .stat-trend {
            font-size: 0.75rem;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Glow Colors */
        .color-cyan {
            color: #00f2fe;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
        }

        .color-yellow {
            color: #f9d423;
            text-shadow: 0 0 15px rgba(249, 212, 35, 0.5);
        }

        .color-red {
            color: #ff5858;
            text-shadow: 0 0 15px rgba(255, 88, 88, 0.5);
        }

        .dashboard-chart-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            margin: 0 15px 25px;
            padding: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .chart-container {
            position: relative;
            height: 200px;
            width: 100%;
        }

        .pulse-badge {
            animation: pulseAnim 2s infinite;
        }

        @keyframes pulseAnim {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(255, 59, 48, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 59, 48, 0);
            }
        }

        .report-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.95), rgba(245, 247, 250, 0.95));
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border-left: 4px solid #3273dc;
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 90px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .report-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            border-left-width: 6px;
        }

        .report-card.is-info-card {
            border-left-color: #00d1ff !important;
        }

        .report-card.is-info-card .report-number {
            color: #00d1ff !important;
        }

        .report-card.is-success-card {
            border-left-color: #00ff88 !important;
        }

        .report-card.is-success-card .report-number {
            color: #00ff88 !important;
        }

        .report-card.is-warning-card {
            border-left-color: #ffd700 !important;
        }

        .report-card.is-warning-card .report-number {
            color: #ffd700 !important;
        }

        .report-card.is-danger-card {
            border-left-color: #ff3860 !important;
        }

        .report-card.is-danger-card .report-number {
            color: #ff4d4d !important;
        }

        .report-card .subtitle.is-7 {
            color: #6a7b92;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .report-card .report-number {
            font-size: 1.6rem;
            font-weight: 800;
            color: #1a2340;
            margin-top: auto;
        }

        /* ================= MODERN INPUT DECORATION ================= */
        .input,
        .textarea,
        .select select {
            background: rgba(255, 255, 255, 0.08) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 12px !important;
            color: #ffffff !important;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.1) !important;
            transition: all 0.3s ease !important;
        }

        .input::placeholder,
        .textarea::placeholder {
            color: rgba(255, 255, 255, 0.5) !important;
        }

        .input:hover,
        .textarea:hover,
        .select select:hover {
            background: rgba(255, 255, 255, 0.12) !important;
            border-color: rgba(255, 255, 255, 0.4) !important;
        }

        .input:focus,
        .textarea:focus,
        .select select:focus {
            background: rgba(255, 255, 255, 0.15) !important;
            border-color: #00ffcc !important;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3) !important;
            transform: translateY(-2px);
        }

        /* Đặc trị cho Select */
        .select:not(.is-multiple):not(.is-loading)::after {
            border-color: #00ffcc !important;
        }

        .select select option {
            background: #2b2b2b !important;
            color: #fff !important;
        }

        /* Date input icon color */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        /* Label enhancement */
        .label {
            margin-bottom: 0.5rem !important;
            font-weight: 600 !important;
            letter-spacing: 0.5px;
            font-size: 0.95rem !important;
        }

        @media (max-width: 1024px) {
            .section {
                padding: 1rem 12px !important;
            }

            .container.is-fluid {
                padding-left: 0 !important;
                padding-right: 0 !important;
            }

            .form-box {
                max-width: 100% !important;
                padding: 10px 0 !important;
            }

            .box {
                padding: 1rem !important;
                margin-bottom: 1.5rem !important;
            }

            /* Tăng khoảng cách giữa các hàng trong form trên mobile */
            .columns.is-mobile.is-multiline {
                margin: 0 !important;
                gap: 15px 0;
            }

            .column {
                padding: 0 0.5rem !important;
            }

            /* Ép Textarea và các trường quan trọng thành 100% chiều ngang */
            .column.is-12-mobile-custom,
            .textarea-container,
            .column:has(textarea) {
                width: 100% !important;
                flex: none !important;
            }

            .input,
            .select select,
            .button {
                height: 44px !important;
                /* Touch-friendly size */
            }

            .label {
                font-size: 0.9rem !important;
                margin-bottom: 0.4rem !important;
            }

            .subtitle {
                font-size: 1.1rem !important;
                margin-top: 1.5rem !important;
                margin-bottom: 1rem !important;
                border-left: 4px solid #00ffcc;
                padding-left: 10px;
            }

            /* Forces all tables to take the full device width natively without vw bugs */
            .table-container {
                width: auto !important;
                max-width: none !important;
                margin-left: -12px !important;
                /* bù đắp chính xác padding của .section */
                margin-right: -12px !important;
                border-radius: 0 !important;
                padding: 5px 0 !important;
                box-shadow: none !important;
            }

            /* Ngoại lệ cho bảng bên trong box (có thêm 1rem padding) */
            .box .table-container {
                margin-left: -28px !important;
                /* -12px (section) - 16px (box) */
                margin-right: -28px !important;
            }
        }

        /* ===== HEADER TRANG ĐẦU (HOME ONLY) ===== */
        .home-header {
            background: linear-gradient(135deg, #0f7cf8, #0f7cf8);
            border-radius: 16px;
            padding: 28px 32px;
            margin-bottom: 32px;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
            background: linear-gradient(135deg, rgba(21, 94, 252, 0.95), rgba(243, 67, 67, 0.95));
            backdrop-filter: blur(4px);
        }

        .home-header .logo {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: rgba(161, 245, 169, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }

        .home-header .title-box h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .home-header .title-box p {
            margin-top: 6px;
            font-size: 14px;
            opacity: 0.9;
        }

        /* ===== HOẠT ẢNH LOGO & CHỮ ===== */
        @keyframes pulseLogo {
            0% {
                transform: scale(1);
                filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.4));
            }

            50% {
                transform: scale(1.05);
                filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.8));
            }

            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.4));
            }
        }

        .home-header .header-inner img {
            animation: pulseLogo 3s infinite ease-in-out;
            border-radius: 12px;
            transition: all 0.5s;
        }

        .home-header .header-inner img:hover {
            transform: rotate(5deg) scale(1.1);
        }

        /* Hiệu ứng chữ chạy lần lượt */
        .animated-title {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2px;
        }

        .letter {
            display: inline-block;
            opacity: 0;
            transform: translateY(20px) rotateX(-90deg);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .letter.show {
            opacity: 1;
            transform: translateY(0) rotateX(0);
        }

        .home-logo {
            width: 160px;
            height: auto;
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.4));
        }

        .home-logo:hover {
            filter: drop-shadow(0 0 15px rgba(0, 209, 178, 0.6));
            transform: scale(1.05);
        }

        /* mobile */
        @media (max-width: 768px) {
            .home-header {
                flex-direction: column;
                text-align: center;
                padding: 20px 15px;
            }

            .home-header .title-box h1 {
                font-size: 22px !important;
            }

            .home-logo {
                max-width: 120px;
            }
        }

        .user-widget-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100000;
        }

        .user-profile-widget {
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #3273dc, #23d160);
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .user-profile-widget:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }

        .user-profile-widget:active {
            transform: scale(0.9);
        }

        #up_avatar_char {
            font-size: 22px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* PROFILE DROPDOWN TEXT STYLES */
        /* PROFILE DROPDOWN TEXT STYLES WITH MARQUEE */
        .profile-name-text {
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            color: #1a2340;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            width: 100%;
            position: relative;
        }

        .profile-role-text {
            font-size: 11px;
            color: #3273dc;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            width: 100%;
            position: relative;
        }

        /* Animation cho text chạy (Marquee) */
